// ── TIME HELPERS ──────────────────────────────────────────────
function timeToMin(t){
  if(!t)return 0;
  const[h,m]=(t||"0:0").split(":").map(Number);
  return h*60+(m||0);
}
function getMondayOf(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  const mon=new Date(d);
  mon.setDate(diff); mon.setHours(0,0,0,0);
  return mon;
}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function fmtDate(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}

// ── STORAGE ───────────────────────────────────────────────────
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
async function dbGet(k){if(!SB_ON)return null;try{const r=await fetch(SB_URL+"/rest/v1/life_os?key=eq."+encodeURIComponent(k)+"&select=value",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});const d=await r.json();return d[0]?d[0].value:null;}catch(e){return null;}}
async function dbSet(k,v){if(!SB_ON)return;try{await fetch(SB_URL+"/rest/v1/life_os",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},body:JSON.stringify({key:k,value:JSON.stringify(v)})});}catch(e){}}
function useStore(key,init){
  const[v,sv]=React.useState(function(){const s=lsGet(key);if(s)try{return JSON.parse(s);}catch(e){}return init;});
  React.useEffect(function(){dbGet(key).then(function(r){if(r)try{sv(JSON.parse(r));}catch(e){}}).catch(function(){});},[key]);
  const set=React.useCallback(function(val){sv(val);lsSet(key,val);dbSet(key,val);},[key]);
  return[v,set];
}

// ── LINK RENDER ───────────────────────────────────────────────
function renderText(text){
  const re=/\[([^\]]+)\]\(([^)]+)\)/g;
  const parts=[];let last=0,m;
  while((m=re.exec(text))!==null){if(m.index>last)parts.push(text.slice(last,m.index));parts.push(React.createElement("a",{key:m.index,href:m[2],target:"_blank",rel:"noopener noreferrer",style:{color:C.b,textDecoration:"underline"},onClick:e=>e.stopPropagation()},m[1]));last=m.index+m[0].length;}
  if(last<text.length)parts.push(text.slice(last));
  return parts.length>1?parts:text;
}

// PIN LOCK
// ══════════════════════════════════════════
function Lock({onOk}){
  const[digits,setDigits]=React.useState([]);
  const[shake,setShake]=React.useState(false);
  function press(d){
    if(digits.length>=4)return;
    const next=[...digits,d];setDigits(next);
    if(next.length===4){if(next.join("")===PIN){setTimeout(()=>onOk(),120);}else{setShake(true);setTimeout(()=>{setDigits([]);setShake(false);},600);}}
  }
  return(
    <div style={{background:`linear-gradient(160deg,${C.bg},#0a1428)`,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT}}>
      <div style={{textAlign:"center",padding:"36px 20px",maxWidth:280,width:"100%"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔒</div>
        <div style={{fontSize:26,fontWeight:800,color:C.w,letterSpacing:-1,marginBottom:2}}>Mohamed</div>
        <div style={{fontSize:10,color:C.gr,marginBottom:32,letterSpacing:2,textTransform:"uppercase"}}>Life Operating System</div>
        <div style={{display:"flex",gap:14,justifyContent:"center",marginBottom:36,transition:"transform .15s",transform:shake?"translateX(8px)":"none"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:digits[i]!==undefined?C.b:"transparent",border:`2px solid ${digits[i]!==undefined?C.b:C.bdr}`,transition:"all .15s"}}/>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>
            k===""?<div key={i}/>:
            <button key={i} onClick={()=>k==="⌫"?setDigits(d=>d.slice(0,-1)):press(k)}
              style={{background:k==="⌫"?C.card:C.card2,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"16px 8px",fontSize:k==="⌫"?18:22,fontWeight:700,color:C.w,cursor:"pointer",fontFamily:FONT}}>
              {k}
            </button>
          )}
        </div>
        {shake&&<div style={{color:C.r,fontSize:12,marginTop:16}}>Incorrect PIN</div>}
      </div>
    </div>
  );
}

// WEEK CALENDAR — accurate time blocks with dates
// ══════════════════════════════════════════
function Week({onDayClick,checks,schedule,events,setEvents}){
  const today=new Date();
  const[weekStart,setWeekStart]=React.useState(()=>getMondayOf(today));
  const[addingTo,setAddingTo]=React.useState(null);
  const[evText,setEvText]=React.useState("");
  const[evTime,setEvTime]=React.useState("09:00");
  const tiToday=today.getDay()===0?6:today.getDay()-1;
  const isThisWeek=getMondayOf(today).getTime()===weekStart.getTime();
  const nowMin=today.getHours()*60+today.getMinutes();

  // Build a smart layout for each day:
  // Actual blocks shown proportionally, large gaps condensed to thin dividers
  function buildLayout(blocks){
    if(!blocks||blocks.length===0)return[];
    const sorted=blocks
      .map(function(b,bi){return{...b,_origIdx:bi,sm:timeToMin(b.t),em:timeToMin(b.e)||timeToMin(b.t)+30};})
      .filter(function(b){return b.sm>=300&&b.sm<1440;})
      .sort(function(a,b){return a.sm-b.sm;});
    if(sorted.length===0)return[];
    const items=[];
    const DAY_S=sorted[0].sm;
    const DAY_E=sorted[sorted.length-1].em;
    const ACTIVE=DAY_E-DAY_S;
    // Add gap at start if first block doesn't start at 5am
    let cursor=DAY_S;
    for(let i=0;i<sorted.length;i++){
      const b=sorted[i];
      const gap=b.sm-cursor;
      if(gap>30){items.push({type:"gap",mins:gap,label:minsToLabel(cursor)+"–"+minsToLabel(b.sm)});}
      items.push({type:"block",...b,_bi:b._origIdx,mins:Math.max(b.em-b.sm,15)});
      cursor=b.em;
    }
    // Calculate weights: gaps get 0.3px/min, blocks get full px/min
    const TOTAL_H=720;
    let blockMins=0,gapMins=0;
    items.forEach(function(it){it.type==="block"?blockMins+=it.mins:gapMins+=it.mins;});
    const GAP_PX_PER_MIN=0.25;
    const gapPx=gapMins*GAP_PX_PER_MIN;
    const blockPx=TOTAL_H-gapPx;
    const pxPerBlockMin=blockMins>0?blockPx/blockMins:2;
    items.forEach(function(it){
      it.h=it.type==="block"?Math.max(it.mins*pxPerBlockMin,10):Math.max(it.mins*GAP_PX_PER_MIN,8);
    });
    return items;
  }

  function minsToLabel(m){
    const h=Math.floor(m/60);const mm=m%60;
    const ampm=h>=12?"pm":"am";const h12=h>12?h-12:h===0?12:h;
    return h12+(mm>0?":"+String(mm).padStart(2,"0"):"")+ampm;
  }

  function addEvent(di){
    if(!evText.trim())return;
    setEvents({...events,[di]:[...(events[di]||[]),{id:Date.now(),text:evText.trim(),time:evTime,color:WM[di].color}]});
    setEvText("");setAddingTo(null);
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT}}>
      {/* Sticky header */}
      <div style={{background:C.surf,borderBottom:"1px solid "+C.bdr,padding:"13px 14px",position:"sticky",top:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
          <button onClick={()=>setWeekStart(d=>addDays(d,-7))} style={{...sb(C.gr,true),padding:"4px 10px",fontSize:12}}>←</button>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.w}}>{fmtDate(weekStart)} — {fmtDate(addDays(weekStart,6))}</div>
            {!isThisWeek&&<button onClick={()=>setWeekStart(getMondayOf(today))} style={{background:"none",border:"none",color:C.b,fontSize:10,cursor:"pointer",fontFamily:FONT}}>Today</button>}
          </div>
          <button onClick={()=>setWeekStart(d=>addDays(d,7))} style={{...sb(C.gr,true),padding:"4px 10px",fontSize:12}}>→</button>
        </div>
        <div style={{fontSize:9,color:C.gr,textAlign:"center"}}>Tap day → full routine · + to add event</div>
      </div>

      <div style={{overflowX:"auto",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{minWidth:400,padding:"0 4px 80px"}}>
          {/* Day header row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,padding:"8px 0 6px",position:"sticky",top:64,background:C.bg,zIndex:10}}>
            {WM.map((d,i)=>{
              const dayDate=addDays(weekStart,i);
              const isToday=isThisWeek&&i===tiToday;
              const dayChecks=schedule[i]?(()=>{let t=0,dn=0;schedule[i].blocks.forEach((b,bi)=>b.items.forEach((_,ii)=>{t++;if(checks[i+"-"+bi+"-"+ii])dn++;}));return{done:dn,total:t};})():{done:0,total:0};
              const dayEvs=events[i]||[];
              return(
                <div key={i} style={{display:"flex",flexDirection:"column",gap:2}}>
                  <div onClick={()=>onDayClick(i)} style={{background:isToday?d.color+"18":C.card,border:"1.5px solid "+(isToday?d.color+"88":C.bdr),borderRadius:10,padding:"6px 3px",textAlign:"center",cursor:"pointer",boxShadow:isToday?"0 0 16px "+d.color+"33":"none"}}>
                    <div style={{fontSize:8,color:isToday?d.color:C.gr,fontWeight:700}}>{d.short}</div>
                    <div style={{fontSize:8,color:isToday?d.color:C.dim}}>{fmtDate(dayDate)}</div>
                    <div style={{fontSize:14,margin:"2px 0"}}>{d.emoji}</div>
                    {isToday&&<div style={{fontSize:7,color:d.color,fontWeight:800}}>TODAY</div>}
                    {dayChecks.total>0&&<div style={{fontSize:7,color:d.color,fontWeight:700}}>{Math.round(dayChecks.done/dayChecks.total*100)}%</div>}
                    <div style={{background:"rgba(255,255,255,0.05)",borderRadius:2,height:2.5,margin:"2px 2px 0",overflow:"hidden"}}>
                      <div style={{height:"100%",width:dayChecks.total>0?(Math.round(dayChecks.done/dayChecks.total*100)+"%"):"0%",background:d.color}}/>
                    </div>
                  </div>
                  {dayEvs.map(ev=>(
                    <div key={ev.id} onClick={()=>onDayClick(i)} style={{background:ev.color+"22",border:"1px solid "+ev.color+"55",borderRadius:5,padding:"2px 3px",cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontSize:7,color:ev.color,fontWeight:700}}>{ev.time}</div>
                      <div style={{fontSize:7,color:C.text,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{ev.text}</div>
                    </div>
                  ))}
                  <button onClick={e=>{e.stopPropagation();setAddingTo(i);}} style={{background:"transparent",border:"1px dashed "+d.color+"44",borderRadius:5,padding:"1px",color:d.color,fontSize:10,cursor:"pointer",fontFamily:FONT}}>+</button>
                </div>
              );
            })}
          </div>

          {/* Smart block columns — no fixed time axis */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {WM.map((d,di)=>{
              const isToday=isThisWeek&&di===tiToday;
              const layout=buildLayout(schedule[di]?.blocks||[]);
              let accY=0;
              return(
                <div key={di} onClick={()=>onDayClick(di)} style={{background:isToday?C.card:"#070712",borderRadius:10,overflow:"hidden",cursor:"pointer",border:"1px solid "+(isToday?d.color+"44":C.bdr),minHeight:200,opacity:isToday?1:0.55,display:"flex",flexDirection:"column"}}>
                  {layout.map((item,idx)=>{
                    if(item.type==="gap"){
                      return(
                        <div key={idx} style={{height:item.h,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",borderTop:"1px dashed "+C.bdr,borderBottom:"1px dashed "+C.bdr}}>
                          <div style={{fontSize:5.5,color:C.dim,letterSpacing:.5}}>{item.label}</div>
                        </div>
                      );
                    }
                    const cc=CAT[item.cat]?.c||C.gr;
                    const bDone=item.items&&item._bi!==undefined?item.items.filter((_,ii)=>checks[di+"-"+item._bi+"-"+ii]).length:0;
                    const allDone=item.items&&bDone===item.items.length&&item.items.length>0;
                    const isNow=isToday&&nowMin>=item.sm&&nowMin<item.em;
                    return(
                      <div key={idx} style={{height:item.h,flexShrink:0,background:isNow?cc+"44":isToday?cc+"22":cc+"0d",borderLeft:"2px solid "+(isToday?cc+(isNow?"ee":"77"):cc+"28"),borderBottom:"1px solid "+C.bdr+"88",overflow:"hidden",padding:"2px 3px",position:"relative",boxShadow:isNow?"0 0 10px "+cc+"55":"none"}}>
                        {item.h>16&&(
                          <div style={{fontSize:6,color:isNow?C.w:isToday?cc:cc+"66",fontWeight:700,lineHeight:1.2,overflow:"hidden"}}>
                            {allDone?"✓ ":""}{item.emoji} {item.title}
                          </div>
                        )}
                        {item.h>28&&(
                          <div style={{fontSize:5,color:isToday?C.gr:C.dim,marginTop:1}}>{minsToLabel(item.sm)}</div>
                        )}
                        {isNow&&(
                          <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:cc,boxShadow:"0 0 6px "+cc}}/>
                        )}
                      </div>
                    );
                  })}
                  {layout.length===0&&(
                    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <div style={{fontSize:8,color:C.dim}}>Rest</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Add event modal */}
      {addingTo!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={()=>setAddingTo(null)}>
          <div style={{background:C.card,borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:480}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:14,fontWeight:700,color:WM[addingTo].color,marginBottom:14}}>Add event — {WM[addingTo].name}</div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input type="time" value={evTime} onChange={e=>setEvTime(e.target.value)} style={{...ip(WM[addingTo].color),width:100,flexShrink:0}}/>
              <input value={evText} onChange={e=>setEvText(e.target.value)} placeholder="Dentist, appointment..." style={ip(WM[addingTo].color)} autoFocus onKeyDown={e=>e.key==="Enter"&&addEvent(addingTo)}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>addEvent(addingTo)} style={{...sb(WM[addingTo].color),flex:1}}>Add to Calendar</button>
              <button onClick={()=>setAddingTo(null)} style={sb(WM[addingTo].color,true)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Day({dayIdx,checks,setChecks,schedule,setSchedule,nav,events,subjects}){
  const[collapsed,setCollapsed]=useStore("col_v5",{});
  const[editMode,setEditMode]=React.useState(false);
  const[fullTextEdit,setFullTextEdit]=React.useState(null);
  const[fullText,setFullText]=React.useState("");
  const[editItem,setEditItem]=React.useState(null);
  const[editText,setEditText]=React.useState("");
  const[addTo,setAddTo]=React.useState(null);
  const[addText,setAddText]=React.useState("");
  const[editTitle,setEditTitle]=React.useState(null);
  const[editTitleText,setEditTitleText]=React.useState("");
  const[editTime,setEditTime]=React.useState(null);
  const[editTimeText,setEditTimeText]=React.useState("");
  const[addInsert,setAddInsert]=React.useState(null);
  const[insertText,setInsertText]=React.useState("");

  const day=schedule[dayIdx];const meta=WM[dayIdx];
  if(!day||!meta)return null;
  const{done,total}=(()=>{let t=0,d=0;day.blocks.forEach((b,bi)=>b.items.forEach((_,ii)=>{t++;if(checks[`${dayIdx}-${bi}-${ii}`])d++;}));return{done:d,total:t};})();
  const dayEvs=events[dayIdx]||[];
  const upd=(fn)=>setSchedule(schedule.map((d,di)=>di!==dayIdx?d:{...d,blocks:fn(d.blocks)}));

  function togChk(bi,ii){const k=`${dayIdx}-${bi}-${ii}`;setChecks({...checks,[k]:!checks[k]});}
  function saveItem(){if(!editItem||!editText.trim()){setEditItem(null);return;}upd(bs=>bs.map((b,bI)=>bI!==editItem.bi?b:{...b,items:b.items.map((it,iI)=>iI===editItem.ii?editText.trim():it)}));setEditItem(null);setEditText("");}
  function delItem(bi,ii){upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,items:b.items.filter((_,iI)=>iI!==ii)}));setEditItem(null);}
  function addItem(bi){if(!addText.trim()){setAddTo(null);return;}upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,items:[...b.items,addText.trim()]}));setAddText("");setAddTo(null);}
  function insertItem(bi,ii){if(!insertText.trim()){setAddInsert(null);return;}upd(bs=>bs.map((b,bI)=>{if(bI!==bi)return b;const items=[...b.items];items.splice(ii,0,insertText.trim());return{...b,items};}));setInsertText("");setAddInsert(null);}
  function moveItem(bi,ii,dir){upd(bs=>bs.map((b,bI)=>{if(bI!==bi)return b;const items=[...b.items];const ni=ii+dir;if(ni<0||ni>=items.length)return b;[items[ii],items[ni]]=[items[ni],items[ii]];return{...b,items};}));}
  function saveTitle(bi){if(!editTitleText.trim()){setEditTitle(null);return;}upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,title:editTitleText.trim()}));setEditTitle(null);setEditTitleText("");}
  function saveTime(bi){if(!editTimeText.trim()){setEditTime(null);return;}upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,t:editTimeText.trim()}));setEditTime(null);setEditTimeText("");}
  function delBlock(bi){upd(bs=>bs.filter((_,bI)=>bI!==bi));}
  function addBlock(){upd(bs=>[...bs,{id:"nb"+Date.now(),t:"12:00",e:"13:00",title:"New Block",cat:"study",emoji:"📝",items:["New item"]}]);}
  function openFullEdit(bi){setFullText(day.blocks[bi].items.join("\n"));setFullTextEdit(bi);}

            <button onClick={()=>setFullTextEdit(null)} style={{...sb(C.gr,true),padding:"5px 10px",fontSize:11}}>Cancel</button>
            <div style={{flex:1,fontSize:13,fontWeight:700,color:C.w}}>📝 Edit Block — one item per line</div>
            <button onClick={saveFullEdit} style={{...sb(C.g),padding:"5px 14px",fontSize:11}}>Save</button>
          </div>
          <div style={{padding:"10px 14px",fontSize:9,color:C.gr}}>One line = one checklist item · Lines starting with "──" become headers · "  " indent = sub-item</div>
          <textarea value={fullText} onChange={e=>setFullText(e.target.value)} autoFocus spellCheck={true}
            style={{flex:1,background:"transparent",border:"none",color:C.text,fontSize:13,fontFamily:FONT,lineHeight:1.8,padding:"0 16px 16px",outline:"none",resize:"none"}}/>
        </div>

function MasterFlash({cards,onClose}){
  const[idx,setIdx]=React.useState(0);const[flip,setFlip]=React.useState(false);const[score,setScore]=React.useState({k:0,d:0});
  const sh=[...cards].sort(()=>Math.random()-.5);
  if(sh.length===0)return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,fontFamily:FONT}}><div style={{background:C.card,borderRadius:16,padding:24,textAlign:"center",maxWidth:300,width:"90%"}}><div style={{color:C.text,marginBottom:14,fontSize:14}}>No flashcards yet.</div><button onClick={onClose} style={{...sb(C.b),width:"100%"}}>Close</button></div></div>);
  const c=sh[idx%sh.length];const isV=c.word!==undefined;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:300,fontFamily:FONT,padding:20}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",gap:8}}><span style={{...bg(C.g),padding:"4px 10px",fontSize:11}}>✓ {score.k}</span><span style={{...bg(C.r),padding:"4px 10px",fontSize:11}}>✗ {score.d}</span></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:10,color:C.gr}}>{(idx%sh.length)+1}/{sh.length}</span><button onClick={onClose} style={{background:"none",border:"none",color:C.gr,cursor:"pointer",fontSize:16}}>×</button></div>
        </div>
        <div style={{fontSize:8,color:c.subjColor,marginBottom:5,letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>{c.subjName}</div>
        <div onClick={()=>setFlip(f=>!f)} style={{background:C.card,border:`2px solid ${flip?C.g:C.bdr}`,borderRadius:18,padding:28,minHeight:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",textAlign:"center",marginBottom:12}}>
          {!flip?(<><div style={{fontSize:20,fontWeight:700,color:C.w,marginBottom:8}}>{isV?c.word:c.q}</div>{isV&&c.root&&<div style={{fontSize:10,color:C.gr}}>Root: {c.root}</div>}<div style={{fontSize:10,color:C.gr,marginTop:6}}>Tap to reveal</div></>)
          :(<><div style={{fontSize:17,fontWeight:700,color:C.g,marginBottom:8}}>{isV?c.meaning:c.a}</div>{isV&&c.s1&&<div style={{fontSize:12,color:C.text,fontStyle:"italic"}}>"{c.s1}"</div>}</>)}
        </div>
        {flip&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <button onClick={()=>{setScore(s=>({...s,k:s.k+1}));setIdx(i=>i+1);setFlip(false);}} style={{...sb(C.g),padding:"12px",fontSize:13}}>✓ Knew it</button>
          <button onClick={()=>{setScore(s=>({...s,d:s.d+1}));setIdx(i=>i+1);setFlip(false);}} style={{...sb(C.r),padding:"12px",fontSize:13}}>✗ Didn't</button>
        </div>}
        {!flip&&<button onClick={()=>{setIdx(i=>i+1);setFlip(false);}} style={{...sb(C.p,true),width:"100%",padding:"10px"}}>Skip →</button>}
      </div>
    </div>
  );
}

  );
}

          <div>

            {spR&&<div style={{textAlign:"center",fontSize:13,fontWeight:700,color:spR.startsWith("✓")?C.g:C.r,padding:"10px",background:spR.startsWith("✓")?`${C.g}15`:`${C.r}15`,borderRadius:10}}>{spR}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Todo({todos,setTodos}){
  const[tab,setTab]=React.useState("all");
  const[newText,setNewText]=React.useState("");
  const[selDay,setSelDay]=React.useState(WM[new Date().getDay()===0?6:new Date().getDay()-1].name);
  const[noteText,setNoteText]=React.useState(todos._note||"");
  const DAYS=WM.map(w=>w.name);
  const allTodos=todos._all||[];
  const dayTodos=(todos._day?.[selDay])||[];
  const showList=tab==="all"?allTodos:dayTodos;

  function add(){
    if(!newText.trim())return;
    if(tab==="all")setTodos({...todos,_all:[...allTodos,{id:Date.now(),text:newText.trim(),done:false}]});
    else setTodos({...todos,_day:{...(todos._day||{}),[selDay]:[...dayTodos,{id:Date.now(),text:newText.trim(),done:false}]}});
    setNewText("");
  }
  function toggle(id,isDay=false){
    if(isDay)setTodos({...todos,_day:{...(todos._day||{}),[selDay]:dayTodos.map(t=>t.id===id?{...t,done:!t.done}:t)}});
    else setTodos({...todos,_all:allTodos.map(t=>t.id===id?{...t,done:!t.done}:t)});
  }
  function del(id,isDay=false){
    if(isDay)setTodos({...todos,_day:{...(todos._day||{}),[selDay]:dayTodos.filter(t=>t.id!==id)}});
    else setTodos({...todos,_all:allTodos.filter(t=>t.id!==id)});
  }
  function copyToDay(t){setTodos({...todos,_day:{...(todos._day||{}),[selDay]:[...dayTodos,{...t,id:Date.now()}]}});}
  function saveNote(v){setNoteText(v);setTodos({...todos,_note:v});}

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 14px"}}>
        <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:3}}>Task Management</div>
        <div style={{fontSize:18,fontWeight:800,color:C.w,marginBottom:10}}>To-Do List</div>
        <div style={{display:"flex",gap:4}}>
          {[["all","📋 All"],["day","📅 By Day"],["note","📝 Notes"]].map(([v,l])=><button key={v} onClick={()=>setTab(v)} style={{...sb(C.g,tab!==v),padding:"4px 10px",fontSize:10}}>{l}</button>)}
        </div>
      </div>
      <div style={{padding:"12px 14px 0"}}>
        {tab!=="note"&&(<>
          {tab==="day"&&<div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:9}}>{DAYS.map(d=><button key={d} onClick={()=>setSelDay(d)} style={{background:"none",border:"none",borderBottom:`2px solid ${selDay===d?C.g:"transparent"}`,padding:"4px 8px",fontSize:10,cursor:"pointer",color:selDay===d?C.g:C.gr,fontFamily:FONT,whiteSpace:"nowrap"}}>{d.slice(0,3)}</button>)}</div>}
          <div style={{display:"flex",gap:7,marginBottom:9}}>
            <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder={tab==="all"?"Add to master list...":"Add for "+selDay+"..."} style={{...ip(C.g),flex:1}} spellCheck={true}/>
            <button onClick={add} style={{...sb(C.g),padding:"8px 13px",fontSize:14}}>+</button>
          </div>
          {showList.length===0?<div style={{color:C.gr,fontSize:12,fontStyle:"italic",textAlign:"center",padding:"30px 0"}}>No tasks here.</div>:showList.map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:C.card,border:`1px solid ${C.bdr}`,borderRadius:10,marginBottom:7,opacity:t.done?.45:1}}>
              <button onClick={()=>toggle(t.id,tab==="day")} style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`1.5px solid ${t.done?C.g:C.dim}`,background:t.done?C.g:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{t.done&&<span style={{color:C.bg,fontSize:10,fontWeight:900}}>✓</span>}</button>
              <span style={{flex:1,fontSize:12,color:C.text,textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
              {tab==="all"&&<button onClick={()=>copyToDay(t)} style={{...sb(C.gr,true),padding:"2px 7px",fontSize:9,flexShrink:0}}>→{selDay.slice(0,3)}</button>}
              <button onClick={()=>del(t.id,tab==="day")} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:14,opacity:.6}}>×</button>
            </div>
          ))}
        </>)}
        {tab==="note"&&(
          <div>
            <div style={{fontSize:10,color:C.gr,marginBottom:7}}>Free-form notes, planning, paste things here...</div>
            <textarea value={noteText} onChange={e=>saveNote(e.target.value)} spellCheck={true} placeholder="Write anything..." style={{...ta(C.g),minHeight:"65vh",lineHeight:1.7,fontSize:13}}/>
          </div>
        )}
      </div>
    </div>
  );
}



// ══════════════════════════════════════════
// WORKOUT TRACKER — spreadsheet + bar chart
// ══════════════════════════════════════════
function WorkoutTracker({tracker,setTracker,color}){
  const c=color||C.g;
  const[selEx,setSelEx]=React.useState(tracker.selected||"");
  const[newExName,setNewExName]=React.useState("");
  const[addingEx,setAddingEx]=React.useState(false);
  const[newRow,setNewRow]=React.useState({date:new Date().toISOString().slice(0,10),sets:"",reps:"",weight:""});
  const[editCell,setEditCell]=React.useState(null);
  const[editVal,setEditVal]=React.useState("");
  const[view,setView]=React.useState("table"); // table | chart

  const exercises=tracker.exercises||{};
  const exNames=Object.keys(exercises);
  const rows=selEx&&exercises[selEx]?exercises[selEx]:[];

  function addExercise(){
    if(!newExName.trim())return;
    const name=newExName.trim();
    setTracker({...tracker,exercises:{...exercises,[name]:[]},selected:name});
    setSelEx(name);setNewExName("");setAddingEx(false);
  }

  function addRow(){
    if(!selEx)return;
    const r={id:Date.now(),...newRow};
    const updated={...exercises,[selEx]:[...rows,r]};
    setTracker({...tracker,exercises:updated,selected:selEx});
    setNewRow({date:new Date().toISOString().slice(0,10),sets:"",reps:"",weight:""});
  }

  function deleteRow(id){
    const updated={...exercises,[selEx]:rows.filter(function(r){return r.id!==id;})};
    setTracker({...tracker,exercises:updated});
  }

  function deleteExercise(name){
    if(!window.confirm("Delete "+name+" and all its data?"))return;
    const ex={...exercises};delete ex[name];
    const newSel=Object.keys(ex)[0]||"";
    setTracker({...tracker,exercises:ex,selected:newSel});
    setSelEx(newSel);
  }

  function saveCell(rowId,field,val){
    const updated={...exercises,[selEx]:rows.map(function(r){
      return r.id===rowId?{...r,[field]:val}:r;
    })};
    setTracker({...tracker,exercises:updated});
    setEditCell(null);
  }

  // Chart data: max weight per session date
  const chartData=React.useMemo(function(){
    if(!rows||rows.length===0)return[];
    const byDate={};
    rows.forEach(function(r){
      const w=parseFloat(r.weight)||0;
      const vol=(parseFloat(r.sets)||0)*(parseFloat(r.reps)||0)*w;
      if(!byDate[r.date]||vol>byDate[r.date].vol){
        byDate[r.date]={date:r.date,weight:w,vol:vol,sets:r.sets,reps:r.reps};
      }
    });
    return Object.values(byDate).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(-12);
  },[rows]);

  const maxW=chartData.reduce(function(m,d){return Math.max(m,d.weight||0);},0)||1;
  const maxV=chartData.reduce(function(m,d){return Math.max(m,d.vol||0);},0)||1;

  const COLS=["date","sets","reps","weight"];
  const LABELS={date:"Date",sets:"Sets",reps:"Reps",weight:"Weight (lbs)"};

  return(
    <div style={{paddingBottom:20}}>
      {/* Exercise selector */}
      <div style={{display:"flex",gap:7,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{fontSize:9,color:C.gr,textTransform:"uppercase",letterSpacing:1,flexShrink:0}}>Exercise:</div>
        {exNames.map(function(name){return(
          <button key={name} onClick={function(){setSelEx(name);setTracker({...tracker,selected:name});}}
            style={{fontSize:10,padding:"4px 10px",borderRadius:20,cursor:"pointer",fontFamily:FONT,
              background:selEx===name?c+"25":"transparent",
              color:selEx===name?c:C.gr,
              border:"1.5px solid "+(selEx===name?c:C.bdr)}}>
            {name}
            <span onClick={function(e){e.stopPropagation();deleteExercise(name);}}
              style={{marginLeft:5,opacity:.5,fontSize:9}}>×</span>
          </button>
        );})}
        {addingEx?(
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <input value={newExName} onChange={function(e){setNewExName(e.target.value);}}
              onKeyDown={function(e){if(e.key==="Enter")addExercise();}}
              placeholder="Exercise name..." autoFocus
              style={{...ip(c),padding:"4px 9px",fontSize:11,width:140}}/>
            <button onClick={addExercise} style={{...sb(c),padding:"4px 10px",fontSize:10}}>Add</button>
            <button onClick={function(){setAddingEx(false);}} style={{...sb(c,true),padding:"4px 8px",fontSize:10}}>✕</button>
          </div>
        ):(
          <button onClick={function(){setAddingEx(true);}}
            style={{...sb(c,true),padding:"4px 10px",fontSize:10}}>+ New Exercise</button>
        )}
      </div>

      {!selEx&&exNames.length===0&&(
        <div style={{textAlign:"center",padding:"40px 0",color:C.gr}}>
          <div style={{fontSize:28,marginBottom:8}}>🏋️</div>
          <div style={{fontSize:13,marginBottom:6}}>No exercises yet</div>
          <div style={{fontSize:11,color:C.dim}}>Tap "+ New Exercise" to create your first tracker</div>
        </div>
      )}

      {selEx&&(
        <>
          {/* View toggle */}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <button onClick={function(){setView("table");}}
              style={{...sb(view==="table"?c:C.gr,view!=="table"),padding:"5px 14px",fontSize:10}}>📋 Table</button>
            <button onClick={function(){setView("chart");}}
              style={{...sb(view==="chart"?c:C.gr,view!=="chart"),padding:"5px 14px",fontSize:10}}>📊 Chart</button>
          </div>

          {view==="table"&&(
            <>
              {/* Table */}
              <div style={{overflowX:"auto",marginBottom:10,borderRadius:10,border:"1px solid "+c+"33"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:FONT}}>
                  <thead>
                    <tr style={{background:c+"18"}}>
                      {COLS.map(function(col){return(
                        <th key={col} style={{padding:"7px 8px",textAlign:"left",color:c,fontWeight:700,fontSize:9,letterSpacing:.8,textTransform:"uppercase",borderBottom:"1px solid "+c+"33",whiteSpace:"nowrap"}}>{LABELS[col]}</th>
                      );})}
                      <th style={{padding:"7px 8px",borderBottom:"1px solid "+c+"33",width:24}}/>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map(function(row,ri){return(
                      <tr key={row.id} style={{background:ri%2===0?C.card:C.card2,borderBottom:"1px solid "+C.bdr}}>
                        {COLS.map(function(col){
                          const isEditing=editCell&&editCell.id===row.id&&editCell.col===col;
                          return(
                            <td key={col} style={{padding:"5px 8px",color:C.text}}
                              onClick={function(){setEditCell({id:row.id,col:col});setEditVal(row[col]||"");}}>
                              {isEditing?(
                                <input value={editVal} autoFocus
                                  onChange={function(e){setEditVal(e.target.value);}}
                                  onBlur={function(){saveCell(row.id,col,editVal);}}
                                  onKeyDown={function(e){if(e.key==="Enter")saveCell(row.id,col,editVal);if(e.key==="Escape")setEditCell(null);}}
                                  style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid "+c,color:c,fontSize:11,outline:"none",fontFamily:FONT,padding:"1px 0"}}/>
                              ):(
                                <span style={{display:"block",minWidth:col==="date"?80:30,cursor:"text"}}>{row[col]||<span style={{color:C.dim,fontSize:9}}>—</span>}</span>
                              )}
                            </td>
                          );
                        })}
                        <td style={{padding:"5px 8px",textAlign:"right"}}>
                          <button onClick={function(){deleteRow(row.id);}}
                            style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:12,opacity:.6}}>×</button>
                        </td>
                      </tr>
                    );})}
                    {/* Add new row inline */}
                    <tr style={{background:c+"08",borderTop:"2px solid "+c+"33"}}>
                      {COLS.map(function(col){return(
                        <td key={col} style={{padding:"5px 8px"}}>
                          <input
                            type={col==="date"?"date":col==="weight"?"number":"text"}
                            value={newRow[col]}
                            onChange={function(e){setNewRow(function(r){return{...r,[col]:e.target.value};});}}
                            onKeyDown={function(e){if(e.key==="Enter")addRow();}}
                            placeholder={col==="date"?"":col==="sets"?"4":col==="reps"?"6":"185"}
                            style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid "+c+"44",color:C.text,fontSize:11,outline:"none",fontFamily:FONT,padding:"2px 0"}}
                          />
                        </td>
                      );})}
                      <td style={{padding:"5px 8px",textAlign:"right"}}>
                        <button onClick={addRow}
                          style={{background:c,border:"none",borderRadius:4,color:C.bg,fontSize:11,fontWeight:700,cursor:"pointer",padding:"3px 8px",fontFamily:FONT}}>+</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
              {rows.length>0&&(
                <div style={{fontSize:9,color:C.dim,textAlign:"right"}}>Tap any cell to edit</div>
              )}
            </>
          )}

          {view==="chart"&&(
            <div>
              {chartData.length<2?(
                <div style={{textAlign:"center",padding:"30px 0",color:C.gr,fontSize:11}}>Add at least 2 sessions to see your progress chart.</div>
              ):(
                <>
                  {/* Weight progress chart */}
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:10,color:c,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>
                      Max Weight Over Time
                    </div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:140,padding:"0 4px"}}>
                      {chartData.map(function(d,i){
                        const barH=Math.max(4,Math.round((d.weight/maxW)*120));
                        const isMax=d.weight===maxW;
                        return(
                          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                            {isMax&&<div style={{fontSize:7,color:c,fontWeight:700}}>PR</div>}
                            <div style={{width:"100%",height:barH,background:isMax?c:c+"55",borderRadius:"3px 3px 0 0",position:"relative",minHeight:4,transition:"height .3s"}}/>
                            <div style={{fontSize:7,color:c,fontWeight:700}}>{d.weight}</div>
                            <div style={{fontSize:6,color:C.dim,textAlign:"center",writingMode:"unset"}}>{d.date.slice(5)}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Volume chart (sets × reps × weight) */}
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:10,color:C.p,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>
                      Total Volume (sets × reps × weight)
                    </div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100,padding:"0 4px"}}>
                      {chartData.map(function(d,i){
                        const barH=Math.max(4,Math.round((d.vol/maxV)*80));
                        return(
                          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                            <div style={{width:"100%",height:barH,background:C.p+"66",borderRadius:"3px 3px 0 0",minHeight:4}}/>
                            <div style={{fontSize:6,color:C.dim}}>{d.date.slice(5)}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Stats summary */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                    {[
                      {label:"Sessions",val:rows.length,col:c},
                      {label:"Max Weight",val:maxW+" lbs",col:C.a},
                      {label:"Personal Record",val:chartData.filter(function(d){return d.weight===maxW;}).map(function(d){return d.date.slice(5);}).pop()||"—",col:C.g},
                    ].map(function(s){return(
                      <div key={s.label} style={{...cd(s.col,{padding:"9px",marginBottom:0,textAlign:"center"})}}>
                        <div style={{fontSize:8,color:s.col,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:3}}>{s.label}</div>
                        <div style={{fontSize:14,color:C.w,fontWeight:800}}>{s.val}</div>
                      </div>
                    );})}
                  </div>
                </>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// VISION BOARD — free drag, resize, overlap
// ══════════════════════════════════════════
function VisionBoard({vBoard,setVBoard}){
  const[sel,setSel]=React.useState(null);
  const[drag,setDrag]=React.useState(null);
  const[resize,setResize]=React.useState(null);
  const boardRef=React.useRef(null);
  const fileRef=React.useRef(null);

  // Compress image to base64 max 700px, quality 0.65
  function compress(file,cb){
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=new Image();
      img.onload=function(){
        const MAX=700;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        cb(canvas.toDataURL("image/jpeg",0.65),w,h);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function addImages(e){
    const files=Array.from(e.target.files||[]);
    files.forEach(function(file,fi){
      compress(file,function(src,iw,ih){
        const aspect=ih/iw;
        const w=180;const h=Math.round(w*aspect);
        const board=boardRef.current;
        const bw=board?board.offsetWidth:400;
        const bh=board?board.offsetHeight:500;
        const newItem={
          id:Date.now()+fi,
          src:src,
          x:Math.round(20+Math.random()*(bw-w-40)),
          y:Math.round(20+Math.random()*(bh-h-40)),
          w:w,h:h,
          z:vBoard.length+fi+1,
          rot:Math.round((Math.random()-0.5)*12)
        };
        setVBoard(function(prev){return [...prev,newItem];});
      });
    });
    e.target.value="";
  }

  function getXY(e){
    if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
    return{x:e.clientX,y:e.clientY};
  }

  function onBoardMouseMove(e){
    if(drag){
      const{x,y}=getXY(e);
      const dx=x-drag.sx,dy=y-drag.sy;
      setVBoard(function(prev){return prev.map(function(it){
        return it.id===drag.id?{...it,x:Math.max(0,drag.ox+dx),y:Math.max(0,drag.oy+dy)}:it;
      });});
    }
    if(resize){
      const{x,y}=getXY(e);
      const dx=x-resize.sx,dy=y-resize.sy;
      setVBoard(function(prev){return prev.map(function(it){
        if(it.id!==resize.id)return it;
        return{...it,w:Math.max(80,resize.ow+dx),h:Math.max(60,resize.oh+dy)};
      });});
    }
  }

  function onBoardMouseUp(){setDrag(null);setResize(null);}

  function startDrag(e,id){
    e.stopPropagation();e.preventDefault();
    const{x,y}=getXY(e);
    const it=vBoard.find(function(v){return v.id===id;});
    if(!it)return;
    setSel(id);
    // Bring to front
    const maxZ=vBoard.reduce(function(m,v){return Math.max(m,v.z||1);},1);
    setVBoard(function(prev){return prev.map(function(v){return v.id===id?{...v,z:maxZ+1}:v;});});
    setDrag({id,sx:x,sy:y,ox:it.x,oy:it.y});
  }

  function startResize(e,id){
    e.stopPropagation();e.preventDefault();
    const{x,y}=getXY(e);
    const it=vBoard.find(function(v){return v.id===id;});
    if(!it)return;
    setResize({id,sx:x,sy:y,ow:it.w,oh:it.h});
  }

  function rotate(id,dir){
    setVBoard(function(prev){return prev.map(function(it){
      return it.id===id?{...it,rot:(it.rot||0)+dir*5}:it;
    });});
  }

  function deleteImg(id){
    setSel(null);
    setVBoard(function(prev){return prev.filter(function(it){return it.id!==id;});});
  }

  function bringForward(id){
    const maxZ=vBoard.reduce(function(m,v){return Math.max(m,v.z||1);},1);
    setVBoard(function(prev){return prev.map(function(it){return it.id===id?{...it,z:maxZ+1}:it;});});
  }

  function sendBack(id){
    setVBoard(function(prev){return prev.map(function(it){return it.id===id?{...it,z:0}:it;});});
  }

  return(
    <div style={{paddingBottom:20}}>
      {/* Toolbar */}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <button onClick={function(){fileRef.current&&fileRef.current.click();}}
          style={{...sb(C.b),padding:"7px 16px",fontSize:12}}>
          📁 Add Photos
        </button>
        <input ref={fileRef} type="file" accept="image/*" multiple onChange={addImages}
          style={{display:"none"}}/>
        {sel&&(
          <>
            <button onClick={function(){rotate(sel,-1);}} style={{...sb(C.gr,true),padding:"6px 10px",fontSize:12}}>↺</button>
            <button onClick={function(){rotate(sel,1);}} style={{...sb(C.gr,true),padding:"6px 10px",fontSize:12}}>↻</button>
            <button onClick={function(){bringForward(sel);}} style={{...sb(C.p,true),padding:"6px 10px",fontSize:10}}>↑ Front</button>
            <button onClick={function(){sendBack(sel);}} style={{...sb(C.p,true),padding:"6px 10px",fontSize:10}}>↓ Back</button>
            <button onClick={function(){deleteImg(sel);}} style={{...sb(C.r,true),padding:"6px 10px",fontSize:10}}>🗑</button>
            <span style={{fontSize:9,color:C.gr}}>Drag to move · corner to resize</span>
          </>
        )}
        {!sel&&vBoard.length===0&&(
          <span style={{fontSize:11,color:C.gr}}>Tap "Add Photos" to pick images from your camera roll or files</span>
        )}
        {!sel&&vBoard.length>0&&(
          <span style={{fontSize:9,color:C.gr}}>Tap an image to select · drag to move · drag corner to resize</span>
        )}
      </div>

      {/* Board canvas */}
      <div
        ref={boardRef}
        onClick={function(){setSel(null);}}
        onMouseMove={onBoardMouseMove}
        onMouseUp={onBoardMouseUp}
        onMouseLeave={onBoardMouseUp}
        onTouchMove={onBoardMouseMove}
        onTouchEnd={onBoardMouseUp}
        style={{
          position:"relative",width:"100%",height:520,
          background:"#08090f",
          border:"2px dashed "+(vBoard.length===0?C.bdr:"transparent"),
          borderRadius:16,overflow:"hidden",
          backgroundImage:"radial-gradient(circle at 20% 30%, #0d1230 0%, transparent 60%), radial-gradient(circle at 80% 70%, #120d20 0%, transparent 60%)"
        }}>
        {vBoard.length===0&&(
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10}}>
            <div style={{fontSize:40}}>🌟</div>
            <div style={{fontSize:14,color:C.gr,fontWeight:600}}>Your Vision Board</div>
            <div style={{fontSize:11,color:C.dim,textAlign:"center",maxWidth:220,lineHeight:1.5}}>Add photos from your files. Drag them around. Overlap them. Make it yours.</div>

// 75 HARD
// ══════════════════════════════════════════
function Hard75({hard75,setHard75,hard75Streak,setHard75Streak}){
  const tasks=hard75.tasks||H75_DEFAULT;
  const todayKey=new Date().toDateString();
  const todayData=hard75.daily?.[todayKey]||{};
  const[editTasks,setEditTasks]=React.useState(false);
  const[tasksText,setTasksText]=React.useState(tasks.join("\n"));
  const done=tasks.filter((_,i)=>todayData[i]).length;
  const pct=tasks.length>0?Math.round(done/tasks.length*100):0;
  function toggle(i){const next={...hard75,daily:{...(hard75.daily||{}),[todayKey]:{...todayData,[i]:!todayData[i]}}};setHard75(next);}
  function saveTasks(){const t=tasksText.split("\n").map(l=>l.trim()).filter(Boolean);setHard75({...hard75,tasks:t});setEditTasks(false);}
  function completeDay(){if(done<tasks.length){alert("Complete all tasks first!");return;}setHard75Streak((hard75Streak||0)+1);alert(`Day ${(hard75Streak||0)+1} complete! 🔥`);}
  function restart(){if(window.confirm("Restart 75 Hard? This resets your streak.")){setHard75Streak(0);setHard75({...hard75,daily:{}}); } }
  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,paddingBottom:40}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.r}33`,padding:"13px 14px"}}>
        <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:3}}>Discipline</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:800,color:C.w}}>🔥 75 Hard</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setEditTasks(e=>!e)} style={{...sb(C.gr,true),padding:"4px 9px",fontSize:10}}>{editTasks?"✓ Done":"✏️ Edit"}</button>
            <button onClick={restart} style={{...sb(C.r,true),padding:"4px 9px",fontSize:10}}>↺ Reset</button>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{textAlign:"center",background:`${C.r}12`,border:`1px solid ${C.r}33`,borderRadius:16,padding:"22px",marginBottom:14}}>
          <div style={{fontSize:52,fontWeight:900,color:C.r}}>{hard75Streak||0}</div>
          <div style={{fontSize:11,color:C.text}}>Day{hard75Streak!==1?"s":""} complete</div>
          <div style={{fontSize:9,color:C.gr,marginTop:3}}>75 days of absolute discipline</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,height:6,overflow:"hidden",marginBottom:6}}>
          <div style={{height:"100%",width:`${pct}%`,background:C.r,transition:"width .4s"}}/>
        </div>
        <div style={{fontSize:11,color:C.text,marginBottom:14,display:"flex",justifyContent:"space-between"}}>
          <span>{done}/{tasks.length} today</span>
          <span style={{fontWeight:700,color:C.r}}>{pct}%</span>
        </div>
        {editTasks&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,color:C.gr,marginBottom:5}}>One task per line:</div>
            <textarea value={tasksText} onChange={e=>setTasksText(e.target.value)} style={{...ta(C.r),minHeight:160,marginBottom:7}} spellCheck={true}/>
            <button onClick={saveTasks} style={{...sb(C.r),width:"100%",padding:"9px"}}>Save Tasks</button>
          </div>
        )}
        {tasks.map((task,i)=>(
          <div key={i} onClick={()=>toggle(i)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.card,border:`1px solid ${todayData[i]?C.r+"44":C.bdr}`,borderRadius:10,marginBottom:7,cursor:"pointer",opacity:todayData[i]?.7:1}}>
            <div style={{width:20,height:20,borderRadius:5,flexShrink:0,border:`2px solid ${todayData[i]?C.r:C.dim}`,background:todayData[i]?C.r:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{todayData[i]&&<span style={{color:C.bg,fontSize:12,fontWeight:900}}>✓</span>}</div>
            <span style={{fontSize:12,color:C.text,textDecoration:todayData[i]?"line-through":"none"}}>{task}</span>
          </div>
        ))}
        {done===tasks.length&&tasks.length>0&&<button onClick={completeDay} style={{...sb(C.r),width:"100%",padding:"14px",fontSize:14,marginTop:8}}>🔥 Mark Day {(hard75Streak||0)+1} Complete!</button>}
      </div>
    </div>
  );
}

// AI CHAT
// ══════════════════════════════════════════
function Chat({schedule,checks,todos,goals,hard75Streak,subjects,affirmation}){
  const[msgs,setMsgs]=useStore("chat_hist_v1",[{r:"a",t:"Assalamu alaikum Mohamed. I'm your second brain — I have your full schedule, notes, goals, and a growing memory of everything you tell me. What do you need?"}]);
  const[memory,setMemory]=useStore("brain_v1","");
  const[input,setInput]=React.useState("");
  const[loading,setLoading]=React.useState(false);
  const[showMem,setShowMem]=React.useState(false);
  const[savingMem,setSavingMem]=React.useState(false);
  const boxRef=React.useRef(null);
  React.useEffect(()=>{if(boxRef.current)boxRef.current.scrollTop=boxRef.current.scrollHeight;},[msgs,loading]);

  const ti=new Date().getDay()===0?6:new Date().getDay()-1;
  const dayDone=React.useMemo(()=>{
    if(!schedule[ti])return{done:0,total:0};
    let t=0,d=0;
    schedule[ti].blocks.forEach(function(b,bi){b.items.forEach(function(_,ii){t++;if(checks[ti+"-"+bi+"-"+ii])d++;});});
    return{done:d,total:t};
  },[schedule,checks,ti]);

  function getSubjectNotes(){
    var out="";
    var subs=subjects||DEFAULT_SUBS;
    for(var i=0;i<subs.length;i++){
      try{
        var raw=lsGet("pgs_"+subs[i].id);
        if(!raw)continue;
        var pages=JSON.parse(raw);
        for(var j=0;j<pages.length;j++){
          var p=pages[j];
          if(!p.content||p.content.length<30)continue;
          var tmp=document.createElement("div");tmp.innerHTML=p.content;var txt=(tmp.textContent||tmp.innerText||"").trim().slice(0,400);
          if(txt.length>20)out+="\n["+subs[i].name+(pages.length>1?" / "+p.name:"")+"] "+txt;
        }
      }catch(e){}
    }
    return out.slice(0,3000);
  }

  function getCards(){
    var out="";
    var subs=subjects||DEFAULT_SUBS;
    for(var i=0;i<Math.min(subs.length,10);i++){
      try{
        var raw=lsGet("cards_"+subs[i].id);
        if(!raw)continue;
        var cards=JSON.parse(raw);
        for(var j=0;j<Math.min(cards.length,4);j++){
          if(cards[j].q)out+="\n"+subs[i].name+": "+cards[j].q+" -> "+( cards[j].a||"");
        }
      }catch(e){}
    }
    try{
      var vraw=lsGet("vocab_v1");
      if(vraw){var vlist=JSON.parse(vraw);for(var k=0;k<Math.min(vlist.length,10);k++){out+="\nVocab: "+vlist[k].word+" = "+vlist[k].meaning;}}
    }catch(e){}
    return out.slice(0,1500);
  }

  function buildPrompt(){
    var goalsTxt=goals.map(function(g){return"["+g.cat+"] "+g.text;}).join("\n")||"None";
    var todosTxt=(todos._all||[]).filter(function(t){return!t.done;}).map(function(t){return t.text;}).join(", ")||"None";
    var notes=getSubjectNotes();
    var cards=getCards();
    return "You are Mohamed's personal second brain and AI assistant. You know everything about him.\n\nMEMORY:\n"+(memory||"[Fresh start - building memory as we talk]")+"\n\nWHO HE IS:\n23yo Muslim Sudanese-American software engineer at JPMC Philadelphia. Living in car at The Sporting Club during 60-day discipline experiment May-July 2026. Core purpose: become grounded, disciplined, rooted in faith. Studying: Islam (Quran, Hadith, Seerah, Aqeedah), Arabic, history, finance, AWS, LeetCode, vocabulary (root-based). Voice training daily. ABW franchise + SaaS goals. 140 to 165 lbs. Halal only. Daily 5am mosque, 6am club routine.\n\nTODAY: "+WM[ti].name+" - "+WM[ti].theme+"\nSchedule: "+dayDone.done+"/"+dayDone.total+" done\n75 Hard streak: "+(hard75Streak||0)+" days\nAffirmation: "+(affirmation||DEFAULT_AFF)+"\n\nGOALS:\n"+goalsTxt+"\n\nTODOS:\n"+todosTxt+"\n\nSUBJECT NOTES:\n"+notes+"\n\nFLASHCARDS:\n"+cards+"\n\nBe direct, specific, reference his notes. Push him when making excuses. Celebrate real wins. You are his coach, study partner, and second brain combined.";
  }

  function saveMemory(currentMsgs){
    if(savingMem||currentMsgs.length<3)return;
    setSavingMem(true);
    var convo=currentMsgs.map(function(m){return(m.r==="u"?"Mohamed":"AI")+": "+m.t;}).join("\n").slice(0,4000);
    var prompt="Current memory about Mohamed:\n"+(memory||"[none yet]")+"\n\nNew conversation:\n"+convo+"\n\nUpdate his memory profile. Write a dense 300-word summary covering: who he is, what he is learning, his progress, goals, struggles, wins, recent topics. Be specific. Return ONLY the summary text, no labels, no JSON.";
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":CLAUDE_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:500,messages:[{role:"user",content:prompt}]})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.content&&d.content[0]){setMemory(d.content[0].text||"");}
      setSavingMem(false);
    }).catch(function(){setSavingMem(false);});
  }

  function send(){
    if(!input.trim()||loading)return;
    var txt=input.trim();
    setInput("");
    setLoading(true);
    var next=msgs.concat([{r:"u",t:txt}]);
    setMsgs(next);
    var apiMsgs=next.map(function(m){return{role:m.r==="u"?"user":"assistant",content:m.t};});
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":CLAUDE_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,system:buildPrompt(),messages:apiMsgs})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.error){setMsgs(function(m){return m.concat([{r:"a",t:"Error: "+d.error.message}]);});setLoading(false);return;}
      var reply=d.content&&d.content[0]?d.content[0].text:"No response.";
      var withReply=next.concat([{r:"a",t:reply}]);
      var toSave=withReply.slice(-60);
      setMsgs(toSave);
      var aiCount=toSave.filter(function(m){return m.r==="a";}).length;
      if(aiCount>0&&aiCount%6===0)saveMemory(toSave);
      setLoading(false);
    }).catch(function(){
      setMsgs(function(m){return m.concat([{r:"a",t:"Connection error - try again."}]);});
      setLoading(false);
    });
  }

  var QUICK=["What should I focus on today?","Quiz me on my Islamic notes","Help with a LeetCode pattern","Word of the day + root","What have I been learning?","Give me a motivation reset","Review my goals with me","What do I still need to do?"];

  return(
    React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"100vh",background:C.bg,fontFamily:FONT,paddingBottom:58}},
      React.createElement("div",{style:{background:C.surf,borderBottom:"1px solid "+C.bdr,padding:"10px 14px",flexShrink:0}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showMem?8:0}},
          React.createElement("div",null,
            React.createElement("div",{style:{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:1}},"Second Brain"),
            React.createElement("div",{style:{fontSize:15,fontWeight:800,color:C.w}},"🧠 AI Assistant")
          ),
          React.createElement("div",{style:{display:"flex",gap:6}},
            React.createElement("button",{onClick:function(){setShowMem(function(s){return!s;});},style:{...sb(showMem?C.p:C.gr,true),padding:"4px 9px",fontSize:9}},savingMem?"⟳ Saving...":"💾 Memory"),
            React.createElement("button",{onClick:function(){saveMemory(msgs);},disabled:savingMem,style:{...sb(C.b,true),padding:"4px 9px",fontSize:9,opacity:savingMem?0.5:1}},"↑ Save Now"),
            React.createElement("button",{onClick:function(){if(window.confirm("Clear chat? Memory is kept.")){setMsgs([{r:"a",t:"Chat cleared. Memory kept. What do you need?"}]);}},style:{...sb(C.r,true),padding:"4px 8px",fontSize:9}},"🗑")
          )
        ),
        showMem&&React.createElement("div",{style:{background:C.card,borderRadius:10,padding:10,border:"1px solid "+C.p+"33"}},
          React.createElement("div",{style:{fontSize:9,color:C.p,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:5}},"Brain Memory"),
          memory
            ?React.createElement("div",{style:{fontSize:11,color:C.text,lineHeight:1.6,maxHeight:120,overflowY:"auto"}},memory)
            :React.createElement("div",{style:{fontSize:11,color:C.gr,fontStyle:"italic"}},"No memory yet. Chat then tap Save Now.")
        )
      ),
      React.createElement("div",{ref:boxRef,style:{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}},
        msgs.map(function(m,i){
          return React.createElement("div",{key:i,style:{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start"}},
            React.createElement("div",{style:{maxWidth:"87%",padding:"10px 14px",borderRadius:14,fontSize:12,lineHeight:1.7,background:m.r==="u"?C.b+"18":C.card,border:"1px solid "+(m.r==="u"?C.b+"44":C.bdr),color:C.text,whiteSpace:"pre-wrap"}},m.t)
          );
        }),
        loading&&React.createElement("div",{style:{display:"flex"}},
          React.createElement("div",{style:{padding:"10px 14px",borderRadius:14,fontSize:12,background:C.card,border:"1px solid "+C.bdr,color:C.gr,fontStyle:"italic"}},"Thinking...")
        ),
        msgs.length===1&&React.createElement("div",{style:{marginTop:8}},
          React.createElement("div",{style:{fontSize:9,color:C.gr,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}},"Ask your second brain"),
          React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
            QUICK.map(function(q){
              return React.createElement("button",{key:q,onClick:function(){setInput(q);},style:{fontSize:10,padding:"5px 10px",borderRadius:20,background:C.card2,color:C.gr,border:"1px solid "+C.bdr,cursor:"pointer",fontFamily:FONT}},q);

// BODY METRICS TRACKER — weight + strength

function BodyMetrics({bodyLogs,setBodyLogs}){
  const[tab,setTab]=React.useState("weight");
  const[newW,setNewW]=React.useState("");
  const[newNote,setNewNote]=React.useState("");
  const[strLogs,setStrLogs]=useStore("strength_v1",{});

  const PRESETS=["Bench Press","Deadlift","Squat","OHP","Pull-Ups","Barbell Row"];
  const exNames=Array.from(new Set([...PRESETS,...Object.keys(strLogs)]));
  const exRows=strLogs[selEx]||[];

  // Weight chart
  const weightData=bodyLogs.slice(-30).filter(function(l){return l.w;});
  const maxBW=weightData.reduce(function(m,l){return Math.max(m,parseFloat(l.w)||0);},100)||100;
  const minBW=weightData.reduce(function(m,l){return Math.min(m,parseFloat(l.w)||0);},maxBW)||100;
  const bwRange=(maxBW-minBW)||5;

  // Strength chart
  const strData=exRows.slice(-15);
  const maxStr=strData.reduce(function(m,r){return Math.max(m,parseFloat(r.weight)||0);},0)||1;

  function addWeight(){
    if(!newW.trim())return;
    const entry={id:Date.now(),date:new Date().toISOString().slice(0,10),w:newW.trim(),note:newNote.trim()};
    setBodyLogs([...bodyLogs,entry]);
    setNewW("");setNewNote("");
  }

  function addStrRow(){
    if(!newRow.weight)return;
    const r={id:Date.now(),...newRow};
    setStrLogs({...strLogs,[selEx]:[...exRows,r]});

    if(!newEx.trim())return;

        <div style={{display:"flex",gap:6}}>
          {[["weight","⚖️ Weight"],["strength","💪 Strength"]].map(function(t){return(
            <button key={t[0]} onClick={function(){setTab(t[0]);}}
              style={{...sb(tab===t[0]?C.g:C.gr,tab!==t[0]),padding:"5px 14px",fontSize:10}}>{t[1]}</button>
          );})}
        </div>
      </div>

      <div style={{padding:"14px 14px 0"}}>
        {tab==="weight"&&(
          <div>
            {/* Quick log */}
            <div style={{background:C.card,border:"1px solid "+C.g+"33",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
              <div style={{fontSize:9,color:C.g,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Log Today's Weight</div>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:9,color:C.gr,marginBottom:3}}>Weight (lbs)</div>

// FLOATING CHAT OVERLAY
// ══════════════════════════════════════════
function FloatingChat({open,onClose,schedule,checks,todos,goals,hard75Streak,subjects,affirmation}){
  const[size,setSize]=React.useState("mini");
  const[msgs,setMsgs]=useStore("chat_hist_v1",[{r:"a",t:"Assalamu alaikum. Second brain active — what do you need?"}]);
  const[memory,setMemory]=useStore("brain_v1","");
  const[input,setInput]=React.useState("");
  const[loading,setLoading]=React.useState(false);
  const[pos,setPos]=React.useState(null);
  const[drag,setDrag]=React.useState(null);
  const boxRef=React.useRef(null);

  React.useEffect(function(){if(boxRef.current)boxRef.current.scrollTop=boxRef.current.scrollHeight;},[msgs,loading,open]);

  const ti=new Date().getDay()===0?6:new Date().getDay()-1;

  function getSubjectNotes(){
    var out="";var subs=subjects||DEFAULT_SUBS;
    for(var i=0;i<subs.length;i++){
      try{
        var raw=lsGet("pgs_"+subs[i].id);if(!raw)continue;
        var pages=JSON.parse(raw);
        for(var j=0;j<pages.length;j++){
          var p=pages[j];if(!p.content||p.content.length<30)continue;
          var tmp=document.createElement("div");tmp.innerHTML=p.content;
          var txt=(tmp.textContent||tmp.innerText||"").trim().slice(0,300);
          if(txt.length>20)out+="\n["+subs[i].name+"] "+txt;
        }
      }catch(e){}
    }
    return out.slice(0,2000);
  }

  function buildPrompt(){
    return "You are Mohamed's second brain. Memory:\n"+(memory||"building...")+"\n\nMohamed: 23yo Muslim Sudanese-American engineer at JPMC Philadelphia. Car living at Sporting Club 60-day discipline experiment. Goals: faith mastery, 140-165 lbs, articulate speaker, ABW franchise, SaaS. Today: "+WM[ti].name+" "+WM[ti].theme+". Be direct and specific.\n\nNotes:\n"+getSubjectNotes()+"\n\nGoals:\n"+(goals||[]).map(function(g){return g.text;}).join("\n").slice(0,500)+"\n\nTodos:\n"+((todos._all||[]).filter(function(t){return!t.done;}).map(function(t){return t.text;}).join(", ")||"none");
  }

  function send(){
    if(!input.trim()||loading)return;
    var txt=input.trim();setInput("");setLoading(true);
    var next=msgs.concat([{r:"u",t:txt}]);setMsgs(next);
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":CLAUDE_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,system:buildPrompt(),messages:next.map(function(m){return{role:m.r==="u"?"user":"assistant",content:m.t};})})
    }).then(function(r){return r.json();}).then(function(d){
      var reply=d.error?"Error: "+d.error.message:(d.content&&d.content[0]?d.content[0].text:"No response.");
      var updated=next.concat([{r:"a",t:reply}]);
      setMsgs(updated.slice(-40));setLoading(false);
    }).catch(function(){setMsgs(function(m){return m.concat([{r:"a",t:"Connection error."}]);});setLoading(false);});
  }

  function onDragStart(e){
    e.preventDefault();
    var cx=e.touches?e.touches[0].clientX:e.clientX;
    var cy=e.touches?e.touches[0].clientY:e.clientY;
    var box=e.currentTarget.closest("[data-floatbox]");
    if(!box)return;
    var rect=box.getBoundingClientRect();
    setDrag({ox:rect.left,oy:rect.top,sx:cx,sy:cy});
  }

  React.useEffect(function(){
    if(!drag)return;
    function onMove(e){
      var cx=e.touches?e.touches[0].clientX:e.clientX;
      var cy=e.touches?e.touches[0].clientY:e.clientY;
      var nx=drag.ox+(cx-drag.sx);var ny=drag.oy+(cy-drag.sy);
      setPos({x:Math.max(0,Math.min(nx,window.innerWidth-280)),y:Math.max(0,Math.min(ny,window.innerHeight-200))});
    }
    function onUp(){setDrag(null);}
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove);window.addEventListener("touchend",onUp);
    return function(){window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onUp);};
  },[drag]);

  if(!open)return null;

  var SIZES={
    mini:{width:340,height:460,position:"fixed",bottom:68,right:12,top:"auto",left:"auto",zIndex:500,borderRadius:16},
    half:{width:"50vw",height:"calc(100vh - 60px)",position:"fixed",top:60,right:0,bottom:58,left:"auto",zIndex:500,borderRadius:"16px 0 0 16px"},
    full:{width:"100vw",height:"calc(100vh - 60px)",position:"fixed",top:60,right:0,bottom:58,left:0,zIndex:500,borderRadius:"16px 16px 0 0"},
  };
  var boxStyle=pos&&size==="mini"?{...SIZES.mini,left:pos.x,right:"auto",top:pos.y,bottom:"auto"}:SIZES[size]||SIZES.mini;

  return(
    <div data-floatbox="1" style={{...boxStyle,background:C.surf,border:"1px solid "+C.bdr,boxShadow:"0 8px 40px rgba(0,0,0,0.6)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header / drag handle */}
      <div onMouseDown={onDragStart} onTouchStart={onDragStart}
        style={{padding:"8px 12px",background:C.card2,borderBottom:"1px solid "+C.bdr,display:"flex",alignItems:"center",gap:8,cursor:"grab",flexShrink:0,userSelect:"none"}}>
        <span style={{fontSize:14}}>🧠</span>
        <div style={{flex:1,fontSize:11,fontWeight:700,color:C.w}}>Second Brain</div>
        <div style={{display:"flex",gap:4}}>
          {[["mini","▪"],["half","◫"],["full","⬜"]].map(function(s){return(
            <button key={s[0]} onClick={function(){setSize(s[0]);setPos(null);}}
              style={{background:size===s[0]?C.b+"33":"transparent",border:"none",color:size===s[0]?C.b:C.gr,fontSize:13,cursor:"pointer",borderRadius:4,padding:"1px 5px",fontFamily:FONT}}>
              {s[1]}
            </button>
          );})}
          <button onClick={onClose} style={{background:"none",border:"none",color:C.gr,fontSize:16,cursor:"pointer",marginLeft:4}}>×</button>
        </div>
      </div>
      {/* Messages */}
      <div ref={boxRef} style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:7}}>
        {msgs.map(function(m,i){return(
          <div key={i} style={{display:"flex",justifyContent:m.r==="u"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"88%",padding:"8px 12px",borderRadius:12,fontSize:12,lineHeight:1.65,background:m.r==="u"?C.b+"18":C.card,border:"1px solid "+(m.r==="u"?C.b+"44":C.bdr),color:C.text,whiteSpace:"pre-wrap"}}>{m.t}</div>
          </div>
        );})}
        {loading&&<div style={{display:"flex"}}><div style={{padding:"8px 12px",borderRadius:12,fontSize:12,background:C.card,color:C.gr,fontStyle:"italic"}}>Thinking...</div></div>}
      </div>
      {/* Input */}
      <div style={{padding:"8px 10px",borderTop:"1px solid "+C.bdr,display:"flex",gap:6,flexShrink:0}}>
        <input value={input} onChange={function(e){setInput(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey)send();}}
          placeholder="Ask anything..." style={{...ip(C.b),flex:1,padding:"8px 11px",fontSize:12}}/>
        <button onClick={send} disabled={loading}
          style={{...sb(C.b),padding:"8px 14px",opacity:loading?0.5:1,flexShrink:0,fontSize:12}}>→</button>
      </div>
    </div>
  );
}


// ══════════════════════════════════════════
// NAV BAR
// ══════════════════════════════════════════
function NavBar({screen,nav,chatOpen,setChatOpen}){
  const ITEMS=[
    {id:SC.home,icon:"🏠",label:"Home",c:C.b},
    {id:SC.week,icon:"📅",label:"Cal",c:C.g},
    {id:SC.subjects,icon:"📁",label:"Study",c:C.p},
    {id:SC.goals,icon:"🎯",label:"Goals",c:C.a},
    {id:SC.metrics,icon:"📊",label:"Metrics",c:C.g},
  ];
  function isA(id){return screen===id||(screen===SC.day&&id===SC.week)||(screen===SC.subject&&id===SC.subjects)||(screen===SC.hard75&&id===SC.home)||(screen===SC.chat&&id===SC.home);}
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surf,borderTop:"1px solid "+C.bdr,display:"flex",zIndex:100}}>
      {ITEMS.map(function(item){var on=isA(item.id);return(
        <button key={item.id} onClick={function(){nav(item.id);}}
          style={{flex:1,background:"none",border:"none",borderTop:"2px solid "+(on?item.c:"transparent"),padding:"9px 2px 7px",fontSize:6.5,cursor:"pointer",color:on?item.c:C.gr,fontFamily:FONT,display:"flex",flexDirection:"column",alignItems:"center",gap:2,letterSpacing:.3,textTransform:"uppercase"}}>
          <span style={{fontSize:16}}>{item.icon}</span>{item.label}
        </button>
      );})}
      <button onClick={function(){setChatOpen(function(o){return !o;});}}
        style={{flex:1,background:chatOpen?C.pk+"22":"none",border:"none",borderTop:"2px solid "+(chatOpen?C.pk:"transparent"),padding:"9px 2px 7px",fontSize:6.5,cursor:"pointer",color:chatOpen?C.pk:C.gr,fontFamily:FONT,display:"flex",flexDirection:"column",alignItems:"center",gap:2,letterSpacing:.3,textTransform:"uppercase"}}>
        <span style={{fontSize:16}}>🧠</span>AI
      </button>
    </div>
  );
}

// ══════════════════════════════════════════
// APP
// ══════════════════════════════════════════
function App(){
  const[auth,setAuth]=React.useState(false);
  const[screen,setScreen]=React.useState(SC.home);
  const[dayIdx,setDayIdx]=React.useState(null);
  const[subjectId,setSubjectId]=React.useState(null);
  const[schedData,setSchedData]=React.useState(null);
  const[checks,setChecks]=useStore("chk_v5",{});
  const[todos,setTodos]=useStore("todos_v5",{});
  const[goals,setGoals]=useStore("goals_v5",[]);
  const[subjects,setSubjects]=useStore("subs_v5",DEFAULT_SUBS);
  const[events,setEvents]=useStore("events_v5",{});
  const[hard75,setHard75]=useStore("h75_v5",{});
  const[hard75Streak,setHard75Streak]=useStore("h75s_v5",0);
  const[affirmation,setAffirmation]=useStore("aff_v5",DEFAULT_AFF);
  const[metrics,setMetrics]=useStore("mets_v5",[{id:"water",emoji:"💧",label:"Water",value:"16 cups/day",color:C.b},{id:"streak",emoji:"🔥",label:"Streak",value:"0 days",color:C.r},{id:"weight",emoji:"⚖️",label:"Weight",value:"140→165 lbs",color:C.g}]);
  const[bodyLogs,setBodyLogs]=useStore("body_logs_v1",[]);
  const[chatOpen,setChatOpen]=React.useState(false);

  React.useEffect(function(){
    const s=lsGet("sched_v5");
    if(s)try{setSchedData(JSON.parse(s));return;}catch(e){}
    if(SB_ON){dbGet("sched_v5").then(function(r){try{setSchedData(r?JSON.parse(r):buildSchedule());}catch(e){setSchedData(buildSchedule());}}).catch(function(){setSchedData(buildSchedule());});}
    else setSchedData(buildSchedule());
  },[]);

  function setSchedule(next){setSchedData(next);lsSet("sched_v5",next);dbSet("sched_v5",next);}
  function nav(dest){if(dest.startsWith("subject:")){setSubjectId(dest.replace("subject:",""));setScreen(SC.subject);}else setScreen(dest);}

  if(!auth)return <Lock onOk={()=>setAuth(true)}/>;
  if(!schedData)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.w,fontFamily:FONT,fontSize:13}}>Loading your Life OS...</div>;

  const hideNav=screen===SC.subject;
  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:hideNav?0:58}}>
      {screen===SC.home&&<Home nav={nav} checks={checks} schedule={schedData} todos={todos} setTodos={setTodos} hard75={hard75} setHard75={setHard75} hard75Streak={hard75Streak} setHard75Streak={setHard75Streak} affirmation={affirmation} setAffirmation={setAffirmation} metrics={metrics} setMetrics={setMetrics}/>}
      {screen===SC.week&&<Week onDayClick={(i)=>{setDayIdx(i);setScreen(SC.day);}} checks={checks} schedule={schedData} events={events} setEvents={setEvents}/>}
      {screen===SC.day&&dayIdx!==null&&<Day dayIdx={dayIdx} checks={checks} setChecks={setChecks} schedule={schedData} setSchedule={setSchedule} nav={nav} events={events} subjects={subjects}/>}
      {screen===SC.subjects&&<Subjects nav={nav} subjects={subjects} setSubjects={setSubjects}/>}
      {screen===SC.subject&&subjectId&&<SubjectPage subjectId={subjectId} nav={nav} subjects={subjects}/>}
      {screen===SC.todo&&<Todo todos={todos} setTodos={setTodos}/>}
      {screen===SC.goals&&<Goals goals={goals} setGoals={setGoals}/>}
      {screen===SC.hard75&&<Hard75 hard75={hard75} setHard75={setHard75} hard75Streak={hard75Streak} setHard75Streak={setHard75Streak}/>}
      {screen===SC.metrics&&<BodyMetrics bodyLogs={bodyLogs} setBodyLogs={setBodyLogs}/>}
      <FloatingChat open={chatOpen} onClose={function(){setChatOpen(false);}} schedule={schedData||[]} checks={checks} todos={todos} goals={goals} hard75Streak={hard75Streak} subjects={subjects} affirmation={affirmation}/>
      {screen===SC.chat&&<Chat schedule={schedData} checks={checks} todos={todos} goals={goals} hard75Streak={hard75Streak} subjects={subjects} affirmation={affirmation}/>}
      {!hideNav&&<NavBar screen={screen} nav={nav} chatOpen={chatOpen} setChatOpen={setChatOpen}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
