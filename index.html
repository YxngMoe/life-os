const SB_URL = "PASTE_YOUR_SUPABASE_URL_HERE";
const SB_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";
const PIN = "2232";

async function dbGet(key) {
  try {
    const res = await fetch(SB_URL + "/rest/v1/life_os?key=eq." + encodeURIComponent(key) + "&select=value", {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    });
    const data = await res.json();
    return data[0] ? data[0].value : null;
  } catch(e) { return null; }
}

async function dbSet(key, value) {
  try {
    await fetch(SB_URL + "/rest/v1/life_os", {
      method: "POST",
      headers: {
        "apikey": SB_KEY,
        "Authorization": "Bearer " + SB_KEY,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({ key: key, value: JSON.stringify(value) })
    });
  } catch(e) {}
}

function useStore(key, init) {
  const [v, sv] = React.useState(init);
  React.useEffect(() => {
    dbGet(key).then(function(r) {
      if (r) try { sv(JSON.parse(r)); } catch(e) {}
    }).catch(function(){});
  }, [key]);
  const set = React.useCallback(function(val) {
    sv(val);
    dbSet(key, val).catch(function(){});
  }, [key]);
  return [v, set];
}

// PIN LOCK
// ════════════════════════════════════════════════════════════════
function Lock({onOk}){
  const[digits,setDigits]=React.useState([]);
  const[shake,setShake]=React.useState(false);
  function press(d){
    if(digits.length>=4)return;
    const next=[...digits,d];
    setDigits(next);
    if(next.length===4){
      if(next.join("")===PIN){setTimeout(()=>onOk(),150);}
      else{setShake(true);setTimeout(()=>{setDigits([]);setShake(false);},600);}
    }
  }
  function del(){setDigits(d=>d.slice(0,-1));}
  const KEYS=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  return(
    <div style={{background:`linear-gradient(160deg,${C.bg},#0a1428)`,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT}}>
      <div style={{textAlign:"center",padding:"36px 20px",maxWidth:280,width:"100%"}}>
        <div style={{fontSize:36,marginBottom:12}}>🔒</div>
        <div style={{fontSize:24,fontWeight:800,color:C.w,letterSpacing:-1,marginBottom:4}}>Mohamed</div>
        <div style={{fontSize:10,color:C.gr,marginBottom:32,letterSpacing:2,textTransform:"uppercase"}}>Life Operating System</div>
        <div style={{display:"flex",gap:14,justifyContent:"center",marginBottom:36,transition:"transform .15s",transform:shake?"translateX(8px)":"none"}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:16,height:16,borderRadius:"50%",background:digits[i]!==undefined?C.b:"transparent",border:`2px solid ${digits[i]!==undefined?C.b:C.bdr}`,transition:"all .15s"}}/>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {KEYS.map((k,i)=>(
            k===""?<div key={i}/>:
            <button key={i} onClick={()=>k==="⌫"?del():press(k)}
              style={{background:k==="⌫"?C.card:C.card2,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"16px 8px",fontSize:k==="⌫"?18:22,fontWeight:700,color:C.w,cursor:"pointer",fontFamily:FONT}}>
              {k}
            </button>
          ))}
        </div>
        {shake&&<div style={{color:C.r,fontSize:12,marginTop:16}}>Incorrect PIN</div>}
      </div>
    </div>
  );
}

function MetricsRow({ hard75Streak }) {
  const [metrics, setMetrics] = useStore("metrics_v1", DEFAULT_METRICS);

  const [newEmoji, setNewEmoji] = React.useState("⭐");

  const [newValue, setNewValue] = React.useState("");
  const [newColor, setNewColor] = React.useState(C.b);

  const live = metrics.map(m => m.id==="streak" ? {...m, value:`${hard75Streak||0} days`} : m);

  function addMetric() {
    if (!newLabel.trim()) return;
    const m = {id:"m"+Date.now(), emoji:newEmoji, label:newLabel.trim(), value:newValue.trim()||"—", color:newColor};
    setMetrics([...metrics, m]);
    setNewLabel(""); setNewValue("");
  }
  function delMetric(id) { setMetrics(metrics.filter(m=>m.id!==id)); }

          <div key={m.id} style={{...card(m.color,{padding:"11px 10px",marginBottom:0,position:"relative"})}}>

            ) : (

                  {dayEvs.map(ev=>(

      {/* Add event modal */}
      {addingTo!==null&&(

// ── RENDER ITEM TEXT (supports [text](url) links) ────────────
function renderItemText(text) {
  const linkRe = /\[([^\]]+)\]\(([^)]+)\)/g;
  const parts = [];
  let last = 0, m;
  while ((m = linkRe.exec(text)) !== null) {
    if (m.index > last) parts.push(text.slice(last, m.index));
    parts.push(<a key={m.index} href={m[2]} target="_blank" rel="noopener noreferrer"
      style={{color:"#60a5fa",textDecoration:"underline"}} onClick={e=>e.stopPropagation()}>{m[1]}</a>);
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts.length > 1 ? parts : text;
}

function Day({ dayIdx, checks, setChecks, schedule, setSchedule, nav, events, subjects }) {
  const [collapsed, setCollapsed] = useStore("col_v3", {});
  const [editMode, setEditMode] = React.useState(false);
  const [fullTextEdit, setFullTextEdit] = React.useState(null); // bi index when editing full block as text
  const [fullText, setFullText] = React.useState("");
  const [editItem, setEditItem] = React.useState(null);
  const [editText, setEditText] = React.useState("");
  const [addTo, setAddTo] = React.useState(null);
  const [addText, setAddText] = React.useState("");
  const [editTitle, setEditTitle] = React.useState(null);
  const [editTitleText, setEditTitleText] = React.useState("");
  const [editTime, setEditTime] = React.useState(null);
  const [editTimeText, setEditTimeText] = React.useState("");
  const [addInsert, setAddInsert] = React.useState(null); // {bi, ii} — insert before this index
  const [insertText, setInsertText] = React.useState("");

  const day = schedule[dayIdx]; const meta = WM[dayIdx];
  if (!day || !meta) return null;

  const { done, total } = (() => { let t=0,d=0; day.blocks.forEach((b,bi)=>b.items.forEach((_,ii)=>{t++;if(checks[`${dayIdx}-${bi}-${ii}`])d++;})); return{done:d,total:t}; })();
  const dayEvs = events[dayIdx]||[];

  const upd = (fn) => setSchedule(schedule.map((d,di)=>di!==dayIdx?d:{...d,blocks:fn(d.blocks)}));

  function togChk(bi,ii) { const k=`${dayIdx}-${bi}-${ii}`; setChecks({...checks,[k]:!checks[k]}); }
  function saveItem() { if(!editItem||!editText.trim()){setEditItem(null);return;} upd(bs=>bs.map((b,bI)=>bI!==editItem.bi?b:{...b,items:b.items.map((it,iI)=>iI===editItem.ii?editText.trim():it)})); setEditItem(null);setEditText(""); }
  function delItem(bi,ii) { upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,items:b.items.filter((_,iI)=>iI!==ii)})); setEditItem(null); }
  function addItem(bi) { if(!addText.trim()){setAddTo(null);return;} upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,items:[...b.items,addText.trim()]})); setAddText("");setAddTo(null); }
  function insertItem(bi,ii) { if(!insertText.trim()){setAddInsert(null);return;} upd(bs=>bs.map((b,bI)=>{ if(bI!==bi)return b; const items=[...b.items]; items.splice(ii,0,insertText.trim()); return{...b,items}; })); setInsertText("");setAddInsert(null); }
  function moveItem(bi,ii,dir) { upd(bs=>bs.map((b,bI)=>{ if(bI!==bi)return b; const items=[...b.items]; const ni=ii+dir; if(ni<0||ni>=items.length)return b; [items[ii],items[ni]]=[items[ni],items[ii]]; return{...b,items}; })); }
  function saveTitle(bi) { if(!editTitleText.trim()){setEditTitle(null);return;} upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,title:editTitleText.trim()})); setEditTitle(null);setEditTitleText(""); }
  function saveTime(bi) { if(!editTimeText.trim()){setEditTime(null);return;} upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,t:editTimeText.trim()})); setEditTime(null);setEditTimeText(""); }
  function delBlock(bi) { upd(bs=>bs.filter((_,bI)=>bI!==bi)); }
  function addBlock() {
    const nb={id:"new-"+Date.now(),t:"12:00",title:"New Block",cat:"study",emoji:"📝",items:["New item"]};
    upd(bs=>[...bs,nb]);
  }
  function openFullEdit(bi) {
    const b = day.blocks[bi];
    setFullText(b.items.join("\n"));
    setFullTextEdit(bi);
  }
  function saveFullEdit() {
    if (fullTextEdit===null) return;
    const items = fullText.split("\n").map(l=>l.trim()).filter(Boolean);
    upd(bs=>bs.map((b,bI)=>bI!==fullTextEdit?b:{...b,items}));
    setFullTextEdit(null); setFullText("");
  }
  function changeCat(bi,cat) { upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,cat})); }
  function changeSubjectLink(bi,link) { upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,subjectLink:link||undefined})); }

  const SUBJ_MAP = {}; subjects.forEach(s => { SUBJ_MAP[s.name] = s.id; });

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,paddingBottom:40}}>
      {/* Full text edit modal */}

          <textarea value={fullText} onChange={e=>setFullText(e.target.value)} autoFocus spellCheck={true}
            style={{flex:1,background:"transparent",border:"none",color:C.text,fontSize:13,fontFamily:FONT,lineHeight:1.8,padding:"0 16px 16px",outline:"none",resize:"none"}}/>

          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{fontSize:10,color:C.gr}}>{done}/{total}</div>
            <button onClick={()=>setEditMode(e=>!e)} style={{...btn(editMode?C.g:C.gr,!editMode),padding:"5px 11px",fontSize:11}}>{editMode?"✓ Done":"✏️ Edit"}</button>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",borderRadius:4,height:3,overflow:"hidden"}}>

                      <span style={{fontSize:9,color:C.gr,opacity:.6}}>{bDone}/{block.items.length}</span>
                      {editMode&&<>
                        <button onClick={()=>openFullEdit(bi)} style={{background:"none",border:"none",color:C.p,cursor:"pointer",fontSize:10,padding:"0 2px",opacity:.8}}>📝</button>
                        <button onClick={()=>delBlock(bi)} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:11,padding:"0 2px",opacity:.7}}>🗑</button>
                      </>}
                      <button onClick={()=>setCollapsed(c=>({...c,[ck]:!c[ck]}))} style={{background:"none",border:"none",color:C.gr,cursor:"pointer",fontSize:11,padding:"0 2px"}}>{isCol?"▶":"▼"}</button>
                    </div>
                  </div>
                  {editTitle===bi ? (
                    <div>
                      <input value={editTitleText} onChange={e=>setEditTitleText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveTitle(bi)} autoFocus style={{...inp(cc),marginBottom:5}}/>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>saveTitle(bi)} style={{...btn(cc),padding:"3px 10px",fontSize:10}}>Save</button>
                        <button onClick={()=>setEditTitle(null)} style={{...btn(cc,true),padding:"3px 8px",fontSize:10}}>Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <div onClick={()=>editMode&&(setEditTitle(bi),setEditTitleText(block.title))} style={{display:"flex",alignItems:"center",gap:7,cursor:editMode?"text":"pointer"}}>
                      <span style={{fontSize:14}}>{block.emoji}</span>
                      <span style={{fontSize:12,fontWeight:700,color:allDone?C.dim:C.w,textDecoration:allDone?"line-through":"none"}}>{block.title}</span>
                      {block.subjectLink&&<span onClick={e=>{e.stopPropagation();nav(`subject:${block.subjectLink}`);}} style={{fontSize:9,color:cc,opacity:.7,cursor:"pointer",textDecoration:"underline",marginLeft:2}}>open →</span>}
                    </div>
                  )}
                  {editMode&&(
                    <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
                      <select value={block.cat} onChange={e=>changeCat(bi,e.target.value)} style={{...inp(cc),padding:"3px 6px",fontSize:10,width:"auto"}}>
                        {Object.keys(CAT).map(k=><option key={k} value={k}>{k}</option>)}
                      </select>
                      <select value={block.subjectLink||""} onChange={e=>changeSubjectLink(bi,e.target.value)} style={{...inp(cc),padding:"3px 6px",fontSize:10,width:"auto"}}>
                        <option value="">No subject link</option>
                        {subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                      </select>
                    </div>
                  )}
                </div>

                {/* Items */}
                {!isCol&&(
                  <div style={{padding:"0 12px 10px"}}>
                    {block.items.map((item,ii)=>{
                      const k = `${dayIdx}-${bi}-${ii}`;
                      const isDone = !!checks[k];
                      const isEditing = editItem?.bi===bi&&editItem?.ii===ii;
                      const isLabel = item.startsWith("──");
                      const isInd = item.startsWith("  ");
                      const isWater = item.includes("💧");
                      const insertingHere = addInsert?.bi===bi&&addInsert?.ii===ii;

                      return (
                        <div key={ii}>
                          {insertingHere&&(
                            <div style={{padding:"4px 0",borderTop:`1px dashed ${cc}44`}}>
                              <input value={insertText} onChange={e=>setInsertText(e.target.value)} autoFocus placeholder="Insert item here..." style={{...inp(cc),marginBottom:5,padding:"4px 8px",fontSize:11}}
                                onKeyDown={e=>e.key==="Enter"&&insertItem(bi,ii)}/>
                              <div style={{display:"flex",gap:4}}>
                                <button onClick={()=>insertItem(bi,ii)} style={{...btn(cc),padding:"2px 8px",fontSize:10}}>Insert</button>
                                <button onClick={()=>setAddInsert(null)} style={{...btn(cc,true),padding:"2px 7px",fontSize:10}}>Cancel</button>
                              </div>
                            </div>
                          )}
                          <div style={{display:"flex",alignItems:"flex-start",gap:7,padding:"4px 0",paddingLeft:isInd?16:0,borderTop:`1px solid ${cc}${ii===0?"15":"0a"}`,
                            opacity:isDone?0.65:1}}>
                            {!isLabel&&<button onClick={()=>togChk(bi,ii)} style={{width:15,height:15,borderRadius:3,flexShrink:0,marginTop:2,border:`1.5px solid ${isDone?cc:cc+"55"}`,background:isDone?cc:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                              {isDone&&<span style={{color:C.bg,fontSize:8,fontWeight:900}}>✓</span>}
                            </button>}
                            <div style={{flex:1,marginLeft:isLabel?21:0}}>
                              {isEditing ? (
                                <div>
                                  <textarea value={editText} onChange={e=>setEditText(e.target.value)} autoFocus spellCheck={true} style={{...ta(cc),marginBottom:4,minHeight:40}} rows={2}/>
                                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                                    <button onClick={saveItem} style={{...btn(cc),padding:"3px 10px",fontSize:10}}>Save</button>
                                    <button onClick={()=>setEditItem(null)} style={{...btn(cc,true),padding:"3px 8px",fontSize:10}}>Cancel</button>
                                    <button onClick={()=>delItem(bi,ii)} style={{...btn(C.r,true),padding:"3px 8px",fontSize:10,marginLeft:"auto"}}>🗑</button>
                                  </div>
                                </div>
                              ) : (
                                <div style={{display:"flex",alignItems:"center",gap:4}}>
                                  <div onClick={()=>editMode&&(setEditItem({bi,ii}),setEditText(item))}
                                    style={{flex:1,fontSize:isLabel?9:12,fontWeight:isLabel?700:400,letterSpacing:isLabel?1.2:0,textTransform:isLabel?"uppercase":"none",
                                      color:isWater?"#38bdf8":isLabel?cc:C.text,
                                      lineHeight:1.55,cursor:editMode&&!isLabel?"text":"default",
                                      textDecoration:isDone&&!isLabel?"line-through":"none",
                                      opacity:isLabel?.6:1}}>
                                    {item}
                                  </div>
                                  {editMode&&!isLabel&&(
                                    <div style={{display:"flex",gap:2,flexShrink:0}}>
                                      <button onClick={()=>moveItem(bi,ii,-1)} style={{background:"none",border:"none",color:C.gr,cursor:"pointer",fontSize:10,padding:"0 1px"}}>↑</button>
                                      <button onClick={()=>moveItem(bi,ii,1)} style={{background:"none",border:"none",color:C.gr,cursor:"pointer",fontSize:10,padding:"0 1px"}}>↓</button>
                                      <button onClick={()=>setAddInsert({bi,ii})} style={{background:"none",border:"none",color:cc,cursor:"pointer",fontSize:10,padding:"0 1px"}}>+↑</button>
                                    </div>
                                  )}
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}

                    {addTo===bi ? (
                      <div style={{marginTop:7,borderTop:`1px solid ${cc}15`,paddingTop:7}}>
                        <textarea value={addText} onChange={e=>setAddText(e.target.value)} autoFocus spellCheck={true} placeholder="New item... (Enter to add)" style={{...ta(cc),marginBottom:5,minHeight:40}} rows={2}
                          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addItem(bi);}}}/>
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={()=>addItem(bi)} style={{...btn(cc),padding:"3px 10px",fontSize:10}}>Add</button>
                          <button onClick={()=>setAddTo(null)} style={{...btn(cc,true),padding:"3px 8px",fontSize:10}}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={()=>{setAddTo(bi);setAddText("");setEditItem(null);}}
                        style={{marginTop:7,width:"100%",padding:"4px",background:"transparent",border:`1px dashed ${cc}30`,borderRadius:6,color:cc,fontSize:10,cursor:"pointer",fontFamily:FONT,opacity:.55}}>
                        + Add item
                      </button>
                    )}
                  </div>
                )}
              </div>
            </div>
          );
        })}

        {editMode&&(
          <button onClick={addBlock} style={{...btn(C.g),width:"100%",marginTop:4,padding:"10px"}}>+ Add Block</button>
        )}

        <button onClick={()=>{if(window.confirm(`Reset ${meta.name}?`)){const next=Object.fromEntries(Object.entries(checks).filter(([k])=>!k.startsWith(`${dayIdx}-`)));setChecks(next);}}}
          style={{width:"100%",padding:9,background:"transparent",border:`1px solid ${C.bdr}`,borderRadius:9,color:C.gr,fontSize:10,cursor:"pointer",fontFamily:FONT,marginTop:6}}>
          Reset {meta.name}
        </button>
      </div>
    </div>
  );
}

// SUBJECTS GRID
// ════════════════════════════════════════════════════════════════
function SubjectsGrid({ nav, subjects, setSubjects, prevScreen, setPrevScreen }) {
  const [adding, setAdding] = React.useState(false);
  const [nName, setNName] = React.useState("");
  const [nEmoji, setNEmoji] = React.useState("📝");
  const [nColor, setNColor] = React.useState("#60a5fa");
  const [masterFlash, setMasterFlash] = React.useState(false);
  const [allCards, setAllCards] = useStore("all_cards_v1", {});

  function addSubject() {
    if (!nName.trim()) return;
    const ns = {id:"sub-"+Date.now(), name:nName.trim(), emoji:nEmoji, color:nColor};
    setSubjects([...subjects, ns]);
    setNName(""); setAdding(false);
  }

  const allFlashCards = subjects.flatMap(s => (allCards[s.id]||[]).flatMap(page => (page.cards||[]).map(c=>({...c,subjName:s.name,subjColor:s.color}))));

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 14px"}}>
        <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:3}}>Knowledge Base</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:800,color:C.w}}>Subjects</div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={()=>setMasterFlash(true)} style={{...btn(C.p,true),padding:"5px 10px",fontSize:10}}>🧠 Master Test</button>
            <button onClick={()=>setAdding(a=>!a)} style={{...btn(C.g,true),padding:"5px 10px",fontSize:10}}>+ Add</button>
          </div>
        </div>
        {adding&&(
          <div style={{marginTop:10,padding:12,background:C.card,borderRadius:10}}>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={nEmoji} onChange={e=>setNEmoji(e.target.value)} style={{...inp(C.g),width:50,textAlign:"center"}} placeholder="🎯"/>
              <input value={nName} onChange={e=>setNName(e.target.value)} placeholder="Subject name..." style={{...inp(C.g),flex:1}} onKeyDown={e=>e.key==="Enter"&&addSubject()}/>
              <input type="color" value={nColor} onChange={e=>setNColor(e.target.value)} style={{width:36,height:36,borderRadius:8,border:"none",cursor:"pointer",background:"none"}}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={addSubject} style={{...btn(C.g),padding:"5px 14px",fontSize:11}}>Add Subject</button>
              <button onClick={()=>setAdding(false)} style={{...btn(C.g,true),padding:"5px 10px",fontSize:11}}>Cancel</button>
            </div>
          </div>
        )}
      </div>
      <div style={{padding:"13px 13px 0",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
        {subjects.map(s=>(
          <button key={s.id} onClick={()=>{setPrevScreen&&setPrevScreen("subjects");nav(`subject:${s.id}`);}}
            style={{background:C.card,border:`1px solid ${s.color}28`,borderRadius:14,padding:"15px 8px",cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
            <span style={{fontSize:22,lineHeight:1}}>{s.emoji}</span>
            <span style={{fontSize:10,fontWeight:700,color:s.color,lineHeight:1.3}}>{s.name}</span>
          </button>
        ))}
      </div>

      {masterFlash&&<MasterFlashcard cards={allFlashCards} onClose={()=>setMasterFlash(false)}/>}
    </div>
  );
}

// MASTER FLASHCARD
// ════════════════════════════════════════════════════════════════
function MasterFlashcard({ cards, onClose }) {
  const [idx, setIdx] = React.useState(0);
  const [flip, setFlip] = React.useState(false);
  const [score, setScore] = React.useState({knew:0,didnt:0});
  const shuffled = [...cards].sort(()=>Math.random()-.5);

  if (shuffled.length===0) return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,fontFamily:FONT}}>
      <div style={{background:C.card,borderRadius:16,padding:24,textAlign:"center",maxWidth:340,width:"90%"}}>
        <div style={{fontSize:14,color:C.text,marginBottom:16}}>No flashcards yet. Add Q&A entries to subjects first.</div>
        <button onClick={onClose} style={{...btn(C.b),width:"100%"}}>Close</button>
      </div>
    </div>
  );

  const card = shuffled[idx%shuffled.length];
  const isVocab = card.word !== undefined;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:300,fontFamily:FONT,padding:20}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",gap:8}}>
            <span style={{...badge(C.g),padding:"4px 10px",fontSize:11}}>✓ {score.knew}</span>
            <span style={{...badge(C.r),padding:"4px 10px",fontSize:11}}>✗ {score.didnt}</span>
          </div>
          <div style={{display:"flex",gap:6}}>
            <span style={{fontSize:11,color:C.gr}}>{(idx%shuffled.length)+1}/{shuffled.length}</span>
            <button onClick={onClose} style={{background:"none",border:"none",color:C.gr,cursor:"pointer",fontSize:16}}>×</button>
          </div>
        </div>
        <div style={{fontSize:9,color:card.subjColor,marginBottom:6,letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>{card.subjName}</div>
        <div onClick={()=>setFlip(f=>!f)} style={{background:C.card,border:`2px solid ${flip?C.g:C.bdr}`,borderRadius:20,padding:30,minHeight:220,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",textAlign:"center",marginBottom:12}}>
          {!flip ? (
            <>
              <div style={{fontSize:20,fontWeight:700,color:C.w,marginBottom:8}}>{isVocab?card.word:card.q}</div>
              {isVocab&&card.root&&<div style={{fontSize:11,color:C.gr,marginBottom:4}}>Root: {card.root}</div>}
              <div style={{fontSize:11,color:C.gr}}>Tap to reveal →</div>
            </>
          ) : (
            <>
              <div style={{fontSize:17,fontWeight:700,color:C.g,marginBottom:8}}>{isVocab?card.meaning:card.a}</div>
              {isVocab&&card.s1&&<div style={{fontSize:12,color:C.text,fontStyle:"italic"}}>"{card.s1}"</div>}
            </>
          )}
        </div>
        {flip&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={()=>{setScore(s=>({...s,knew:s.knew+1}));setIdx(i=>i+1);setFlip(false);}} style={{...btn(C.g),padding:"12px",fontSize:13}}>✓ Knew it</button>
            <button onClick={()=>{setScore(s=>({...s,didnt:s.didnt+1}));setIdx(i=>i+1);setFlip(false);}} style={{...btn(C.r),padding:"12px",fontSize:13}}>✗ Didn't</button>
          </div>
        )}
        {!flip&&<button onClick={()=>{setIdx(i=>i+1);setFlip(false);}} style={{...btn(C.p,true),width:"100%",padding:"10px"}}>Skip →</button>}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// SUBJECT PAGE (multi-page notes + rich text + active recall)
// ════════════════════════════════════════════════════════════════
function SubjectPage({ subjectId, nav, subjects, setSubjects, prevScreen }) {
  const subj = subjects.find(s=>s.id===subjectId)||subjects[0];
  if (!subj) return null;
  const isVocab = subj.special==="vocab";
  const isWorkout = subj.special==="workout";

  const [allPages, setAllPages] = useStore(`pages_${subjectId}`, [{id:"p0",name:"Main Notes",content:"",tabs:[]}]);
  const [allCards, setAllCards] = useStore(`cards_${subjectId}`, []);
  const [vocab, setVocab] = useStore("vocab_v1", []);
  const [wLogs, setWLogs] = useStore("wlogs_v1", []);

  const [tab, setTab] = React.useState("notes");
  const [pageIdx, setPageIdx] = React.useState(0);
  const [addingPage, setAddingPage] = React.useState(false);
  const [newPageName, setNewPageName] = React.useState("");

  // Flashcard + quiz
  const DATA = isVocab ? vocab : allCards.flatMap(c=>c.cards||[]);
  const [ci, setCi] = React.useState(0);
  const [flip, setFlip] = React.useState(false);
  const [arScore, setArScore] = React.useState({knew:0,didnt:0});
  const [qQ, setQQ] = React.useState(null);
  const [qA, setQA] = React.useState(null);
  const [qScore, setQScore] = React.useState({r:0,w:0});
  const [si, setSi] = React.useState(0);
  const [spell, setSpell] = React.useState("");
  const [spR, setSpR] = React.useState(null);

  // vocab add form
  const [vF, setVF] = React.useState({word:"",root:"",prefix:"",suffix:"",meaning:"",s1:"",s2:"",s3:""});
  // card add
  const [nQ, setNQ] = React.useState(""); const [nA, setNA] = React.useState("");
  // workout
  const [wEx, setWEx] = React.useState(""); const [wSets, setWSets] = React.useState(""); const [wNote, setWNote] = React.useState("");

  // font controls
  const [fontSize, setFontSize] = React.useState(14);

  const c = subj.color;
  const page = allPages[pageIdx] || allPages[0];

  function updatePageContent(content) {
    setAllPages(allPages.map((p,i)=>i===pageIdx?{...p,content}:p));
  }
  function addPage() {
    if (!newPageName.trim()) return;
    setAllPages([...allPages, {id:"p"+Date.now(),name:newPageName.trim(),content:"",tabs:[]}]);
    setPageIdx(allPages.length); setNewPageName(""); setAddingPage(false);
  }
  function deletePage(i) {
    if (allPages.length===1) return;
    setAllPages(allPages.filter((_,pi)=>pi!==i));
    setPageIdx(0);
  }

  function addCard() {
    if (!nQ.trim()||!nA.trim()) return;
    if (isVocab) setVocab([{id:Date.now(),word:nQ.trim(),meaning:nA.trim(),root:"",date:new Date().toLocaleDateString()},...vocab]);
    else setAllCards([...allCards, {id:Date.now(),q:nQ.trim(),a:nA.trim(),date:new Date().toLocaleDateString()}].map(c=>c.cards?c:{...c,cards:undefined}));
    // simpler: store all as flat
    setAllCards(ac => {
      const flat = ac.flatMap(x=>x.cards||[x]);
      return [...flat, isVocab?null:{id:Date.now(),q:nQ.trim(),a:nA.trim()}].filter(Boolean);
    });
    setNQ(""); setNA("");
  }
  function addVF() {
    if (!vF.word.trim()||!vF.meaning.trim()) return;
    setVocab([{id:Date.now(),...vF,date:new Date().toLocaleDateString()},...vocab]);
    setVF({word:"",root:"",prefix:"",suffix:"",meaning:"",s1:"",s2:"",s3:""});
  }
  function addW() {
    if (!wEx.trim()) return;
    setWLogs([{id:Date.now(),ex:wEx.trim(),sets:wSets,note:wNote,date:new Date().toLocaleDateString()},...wLogs]);
    setWEx(""); setWSets(""); setWNote("");
  }

  function startQ() { if(DATA.length<2)return; setQScore({r:0,w:0}); nextQ(DATA); setTab("quiz"); }
  function nextQ(data) { const co=data[Math.floor(Math.random()*data.length)]; const wr=data.filter(d=>d.id!==co.id).sort(()=>Math.random()-.5).slice(0,3); setQQ({co,opts:[co,...wr].sort(()=>Math.random()-.5)}); setQA(null); }
  function ansQ(opt) { setQA(opt.id); setQScore(s=>opt.id===qQ.co.id?{...s,r:s.r+1}:{...s,w:s.w+1}); }
  function chkSp() { const w=vocab[si]?.word||""; const ok=spell.trim().toLowerCase()===w.toLowerCase(); setSpR(ok?"✓ Correct!":"✗ Wrong — it's: "+w); }

  const TABS = isVocab ? [["notes","Notes"],["add","Add Word"],["flash","Recall"],["quiz","Quiz"],["spell","Spelling"]]
    : isWorkout ? [["notes","Notes"],["log","Log"],["history","History"]]
    : [["notes","Notes"],["add","Add Q&A"],["flash","Recall"],["quiz","Quiz"]];

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,paddingBottom:40}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${c}22`,padding:"13px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <button onClick={()=>{nav(prevScreen===SC.subjects?SC.subjects:SC.subjects);}} style={{...btn(c,true),padding:"5px 11px",fontSize:11}}>← Back</button>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:800,color:c}}>{subj.emoji} {subj.name}</div>
            <div style={{fontSize:9,color:C.gr}}>{DATA.length} entries · {allPages.length} pages</div>
          </div>
        </div>
        <div style={{display:"flex",gap:5,overflowX:"auto"}}>
          {TABS.map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",borderBottom:`2px solid ${tab===id?c:"transparent"}`,padding:"6px 9px",fontSize:10,cursor:"pointer",color:tab===id?c:C.gr,fontFamily:FONT,whiteSpace:"nowrap"}}>{lbl}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"13px 14px 0"}}>
        {/* NOTES */}
        {tab==="notes"&&(
          <div>
            {/* Template picker */}
            {allPages.length===1&&allPages[0].content===""&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:C.gr,marginBottom:6}}>Start with a template:</div>
                <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
                  {Object.keys(J_TEMPLATES).map(t=>(
                    <button key={t} onClick={()=>updatePageContent(J_TEMPLATES[t])}
                      style={{background:C.card,border:`1px solid ${c}33`,borderRadius:8,padding:"5px 10px",fontSize:10,color:c,cursor:"pointer",fontFamily:FONT,whiteSpace:"nowrap"}}>{t}</button>
                  ))}
                </div>
              </div>
            )}
            {/* Page tabs */}
            <div style={{display:"flex",gap:5,marginBottom:10,overflowX:"auto",alignItems:"center"}}>
              {allPages.map((p,i)=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:3}}>

                <div style={{display:"flex",gap:5,alignItems:"center"}}>

                  <button onClick={addPage} style={{...btn(c),padding:"4px 10px",fontSize:10}}>Add</button>

                <button key={f} onClick={()=>setFontSize(f)} style={{background:fontSize===f?`${c}20`:"transparent",border:`1px solid ${fontSize===f?c:C.bdr}`,borderRadius:6,padding:"2px 6px",fontSize:10,color:fontSize===f?c:C.gr,cursor:"pointer",fontFamily:FONT}}>{f}</button>
              ))}

              <button onClick={()=>{if(page)updatePageContent(page.content);}} style={{background:"none",border:`1px solid ${C.bdr}`,borderRadius:6,padding:"2px 8px",fontSize:11,color:C.text,cursor:"pointer",fontFamily:FONT,fontWeight:700}}>B</button>
            </div>

            <textarea
              value={page?.content||""}
              onChange={e=>updatePageContent(e.target.value)}

              spellCheck={true}
              style={{...ta(c),minHeight:"65vh",lineHeight:1.75,fontSize:fontSize}}

          </div>
        )}

        {/* ADD */}
        {tab==="add"&&!isVocab&&!isWorkout&&(
          <div>
            <div style={{fontSize:9,color:c,marginBottom:4}}>Question / Front</div>
            <textarea value={nQ} onChange={e=>setNQ(e.target.value)} spellCheck={true} placeholder="Question or concept..." style={{...ta(c),marginBottom:9}} rows={3}/>
            <div style={{fontSize:9,color:c,marginBottom:4}}>Answer / Back</div>
            <textarea value={nA} onChange={e=>setNA(e.target.value)} spellCheck={true} placeholder="Answer or explanation..." style={{...ta(c),marginBottom:13}} rows={3}/>

            <div style={{marginTop:14}}>

                <div key={d.id||i} style={{...card(c,{marginBottom:7,padding:"9px 11px"})}}>
                  <div style={{fontSize:12,fontWeight:700,color:c}}>{d.q}</div>

              ))}

        )}

        {tab==="add"&&isVocab&&(
          <div>
            {[["word","Word *","e.g. Ephemeral"],["root","Root","e.g. epi (upon) + hemera (day)"],["prefix","Prefix","e.g. un-, re-"],["suffix","Suffix","e.g. -tion, -ness"],["meaning","Meaning *","Definition in your words"]].map(([k,lbl,ph])=>(
              <div key={k} style={{marginBottom:9}}>

            {["s1","s2","s3"].map((k,i)=><input key={k} value={vF[k]} onChange={e=>setVF(f=>({...f,[k]:e.target.value}))} placeholder={`Sentence ${i+1}...`} style={{...inp(c),marginBottom:6}} spellCheck={true}/>)}
            <button onClick={addVF} style={{...btn(c),width:"100%",padding:"11px",marginTop:6}}>Save Word</button>
            <div style={{marginTop:14}}>{vocab.slice(0,4).map(v=>(
              <div key={v.id} style={{...card(c,{marginBottom:7,padding:"9px 11px"})}}>
                <div style={{fontSize:14,fontWeight:700,color:c}}>{v.word}</div>
                <div style={{fontSize:11,color:C.text,marginTop:2}}>{v.meaning}</div>

          <div>
            <div style={{fontSize:9,color:c,marginBottom:4}}>Exercise</div>

            <div style={{fontSize:9,color:c,marginBottom:4}}>Sets / Reps / Weight</div>
            <input value={wSets} onChange={e=>setWSets(e.target.value)} placeholder="e.g. 4x6 @ 185 lbs" style={{...inp(c),marginBottom:8}}/>
            <div style={{fontSize:9,color:c,marginBottom:4}}>Notes</div>
            <textarea value={wNote} onChange={e=>setWNote(e.target.value)} spellCheck={true} placeholder="Form, energy..." style={{...ta(c),marginBottom:12}} rows={2}/>

        )}

        {tab==="history"&&isWorkout&&(
          wLogs.length===0 ? <div style={{textAlign:"center",padding:"50px 0",color:C.gr,fontSize:12}}>No logs yet.</div>
          : wLogs.map(l=>(
            <div key={l.id} style={{...card(c,{padding:"9px 11px",marginBottom:7})}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{fontSize:12,fontWeight:700,color:c}}>{l.ex}</div>
                <span style={{fontSize:9,color:C.gr}}>{l.date}</span>
              </div>
              <div style={{fontSize:11,color:C.text,marginTop:2}}>{l.sets}</div>
              {l.note&&<div style={{fontSize:10,color:C.gr,marginTop:2}}>{l.note}</div>}
            </div>
          ))
        )}

        {/* ACTIVE RECALL FLASHCARDS */}
        {tab==="flash"&&(
          DATA.length===0 ? <div style={{textAlign:"center",padding:"60px 0",color:C.gr,fontSize:12}}>No entries yet.</div>
          : <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",gap:8}}>
                <span style={{...badge(C.g),padding:"3px 9px"}}>✓ {arScore.knew}</span>
                <span style={{...badge(C.r),padding:"3px 9px"}}>✗ {arScore.didnt}</span>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setCi(i=>Math.max(0,i-1));setFlip(false);}} style={{...btn(c,true),padding:"4px 10px",fontSize:11}}>← Prev</button>
                <span style={{fontSize:11,color:C.gr,alignSelf:"center"}}>{(ci%DATA.length)+1}/{DATA.length}</span>
                <button onClick={()=>{setFlip(false);setCi(i=>i+1);}} style={{...btn(c),padding:"4px 10px",fontSize:11}}>Next →</button>
              </div>
            </div>
            {(()=>{const d=DATA[ci%DATA.length];const isV=d.word!==undefined;return(
              <div onClick={()=>setFlip(f=>!f)} style={{background:C.card,border:`2px solid ${flip?C.g:C.bdr}`,borderRadius:18,padding:28,minHeight:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",textAlign:"center",marginBottom:12}}>
                {!flip?(<>
                  <div style={{fontSize:20,fontWeight:700,color:c,marginBottom:8}}>{isV?d.word:d.q}</div>
                  {isV&&d.root&&<div style={{fontSize:10,color:C.gr}}>Root: {d.root}</div>}
                  <div style={{fontSize:10,color:C.gr,marginTop:6}}>Tap to reveal answer</div>
                </>):(<>
                  <div style={{fontSize:17,fontWeight:700,color:C.g,marginBottom:8}}>{isV?d.meaning:d.a}</div>
                  {isV&&d.s1&&<div style={{fontSize:12,color:C.text,fontStyle:"italic"}}>"{d.s1}"</div>}
                </>)}
              </div>
            );})()}
            {flip&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <button onClick={()=>{setArScore(s=>({...s,knew:s.knew+1}));setCi(i=>i+1);setFlip(false);}} style={{...btn(C.g),padding:"11px",fontSize:13}}>✓ Knew it</button>
                <button onClick={()=>{setArScore(s=>({...s,didnt:s.didnt+1}));setCi(i=>i+1);setFlip(false);}} style={{...btn(C.r),padding:"11px",fontSize:13}}>✗ Didn't know</button>
              </div>
            )}
            <button onClick={startQ} style={{...btn(C.p,true),width:"100%",padding:"10px"}}>🧠 Switch to Quiz Mode</button>
          </div>
        )}

        {/* QUIZ */}
        {tab==="quiz"&&(
          DATA.length<2 ? <div style={{textAlign:"center",padding:"50px 0",color:C.gr,fontSize:12}}>Need 2+ entries.</div>
          : <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div style={{display:"flex",gap:8}}>
                <span style={{...badge(C.g),padding:"3px 9px"}}>✓ {qScore.r}</span>
                <span style={{...badge(C.r),padding:"3px 9px"}}>✗ {qScore.w}</span>
              </div>
              <button onClick={()=>startQ()} style={{...btn(c,true),padding:"4px 10px",fontSize:10}}>Restart</button>
            </div>
            {qQ&&(<>
              <div style={{background:C.card,borderRadius:14,padding:20,marginBottom:12,textAlign:"center"}}>
                <div style={{fontSize:10,color:C.gr,marginBottom:6,letterSpacing:1}}>{isVocab?"WHAT DOES THIS MEAN?":"ANSWER:"}</div>
                <div style={{fontSize:20,fontWeight:700,color:c}}>{isVocab?qQ.co.word:qQ.co.q}</div>
              </div>
              {qQ.opts.map(opt=>{
                const ans=isVocab?opt.meaning:opt.a;
                let bg=C.card,brd=C.bdr,co=C.text;
                if(qA){if(opt.id===qQ.co.id){bg=`${C.g}15`;brd=C.g;co=C.g;}else if(opt.id===qA){bg=`${C.r}15`;brd=C.r;co=C.r;}}
                return <div key={opt.id} onClick={()=>{if(!qA)ansQ(opt);}} style={{background:bg,border:`1.5px solid ${brd}`,borderRadius:10,padding:"11px 14px",marginBottom:7,cursor:qA?"default":"pointer",color:co,fontSize:12}}>{ans}</div>;
              })}
              {qA&&<button onClick={()=>nextQ(DATA)} style={{...btn(c),width:"100%",marginTop:7,padding:"10px"}}>Next →</button>}
            </>)}
          </div>
        )}

        {/* SPELLING */}
        {tab==="spell"&&isVocab&&(
          vocab.length===0 ? <div style={{textAlign:"center",padding:"60px 0",color:C.gr,fontSize:12}}>No words yet.</div>
          : <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
              <button onClick={()=>{setSi(i=>Math.max(0,i-1));setSpell("");setSpR(null);}} style={{...btn(c,true),padding:"4px 10px",fontSize:10}}>← Prev</button>
              <span style={{fontSize:10,color:C.gr}}>{si+1}/{vocab.length}</span>
              <button onClick={()=>{setSi(i=>Math.min(vocab.length-1,i+1));setSpell("");setSpR(null);}} style={{...btn(c),padding:"4px 10px",fontSize:10}}>Next →</button>
            </div>
            <div style={{background:C.card,borderRadius:14,padding:22,marginBottom:12,textAlign:"center"}}>
              <div style={{fontSize:9,color:C.gr,marginBottom:7,letterSpacing:1,textTransform:"uppercase"}}>Spell this word:</div>
              <div style={{fontSize:15,color:C.text,fontStyle:"italic",marginBottom:4}}>"{vocab[si].meaning}"</div>
              {vocab[si].root&&<div style={{fontSize:10,color:C.gr}}>Root hint: {vocab[si].root}</div>}
            </div>
            <input value={spell} onChange={e=>{setSpell(e.target.value);setSpR(null);}} placeholder="Type the word..." onKeyDown={e=>e.key==="Enter"&&chkSp()} spellCheck={false}
              style={{...inp(c),marginBottom:9,fontSize:15,textAlign:"center",letterSpacing:2}}/>
            <button onClick={chkSp} style={{...btn(c),width:"100%",padding:"10px",marginBottom:9}}>Check</button>
            {spR&&<div style={{textAlign:"center",fontSize:14,fontWeight:700,color:spR.startsWith("✓")?C.g:C.r,padding:"11px",background:spR.startsWith("✓")?`${C.g}15`:`${C.r}15`,borderRadius:10}}>{spR}</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// TO-DO (general + daily)
// ════════════════════════════════════════════════════════════════
function Todo({ todos, setTodos }) {
  const [tab, setTab] = React.useState("all");
  const [newText, setNewText] = React.useState("");
  const [newDay, setNewDay] = React.useState("Monday");
  const [noteText, setNoteText] = React.useState(todos._note||"");
  const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const allTodos = todos._all || [];
  const dayTodos = todos[newDay] || [];

  function add() {
    if (!newText.trim()) return;
    if (tab==="all") {
      setTodos({...todos, _all:[...allTodos, {id:Date.now(),text:newText.trim(),done:false}]});
    } else {
      setTodos({...todos, [newDay]:[...dayTodos, {id:Date.now(),text:newText.trim(),done:false}]});
    }
    setNewText("");
  }
  function toggle(id, isDay=false) {
    if (isDay) setTodos({...todos, [newDay]:dayTodos.map(t=>t.id===id?{...t,done:!t.done}:t)});
    else setTodos({...todos, _all:allTodos.map(t=>t.id===id?{...t,done:!t.done}:t)});
  }
  function del(id, isDay=false) {
    if (isDay) setTodos({...todos, [newDay]:dayTodos.filter(t=>t.id!==id)});
    else setTodos({...todos, _all:allTodos.filter(t=>t.id!==id)});
  }
  function copyToDay(t) {
    setTodos({...todos, [newDay]:[...dayTodos, {...t,id:Date.now()}]});
  }
  function saveNote(v) {
    setNoteText(v);
    setTodos({...todos, _note:v});
  }

  const showList = tab==="all" ? allTodos : dayTodos;

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 14px"}}>
        <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:3}}>Task Management</div>
        <div style={{fontSize:18,fontWeight:800,color:C.w}}>To-Do List</div>
      </div>
      <div style={{padding:"12px 14px 0"}}>
        {/* Tab selector */}
        <div style={{display:"flex",gap:5,marginBottom:12}}>
          {[["all","📋 All Tasks"],["day","📅 By Day"],["note","📝 Notes"]].map(([v,l])=>(
            <button key={v} onClick={()=>setTab(v)} style={{...btn(C.g,tab!==v),padding:"5px 12px",fontSize:11}}>{l}</button>
          ))}
        </div>

        {tab!=="note"&&(
          <>
            {tab==="day"&&(
              <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:10}}>
                {DAYS.map(d=><button key={d} onClick={()=>setNewDay(d)} style={{background:"none",border:"none",borderBottom:`2px solid ${newDay===d?C.g:"transparent"}`,padding:"4px 9px",fontSize:10,cursor:"pointer",color:newDay===d?C.g:C.gr,fontFamily:FONT,whiteSpace:"nowrap"}}>{d.slice(0,3)}</button>)}
              </div>
            )}
            <div style={{display:"flex",gap:7,marginBottom:10}}>
              <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder={tab==="all"?"Add to master list...":"Add task for "+newDay+"..."} style={{...inp(C.g),flex:1}} spellCheck={true}/>
              <button onClick={add} style={{...btn(C.g),padding:"8px 14px",fontSize:14}}>+</button>
            </div>
            {showList.length===0?<div style={{color:C.gr,fontSize:12,fontStyle:"italic",textAlign:"center",padding:"30px 0"}}>No tasks here.</div>
            :showList.map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:C.card,border:`1px solid ${C.bdr}`,borderRadius:10,marginBottom:7,opacity:t.done?.5:1}}>
                <button onClick={()=>toggle(t.id,tab==="day")} style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`1.5px solid ${t.done?C.g:C.dim}`,background:t.done?C.g:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {t.done&&<span style={{color:C.bg,fontSize:10,fontWeight:900}}>✓</span>}
                </button>
                <span style={{flex:1,fontSize:12,color:C.text,textDecoration:t.done?"line-through":"none"}}>{t.text}</span>
                {tab==="all"&&<button onClick={()=>copyToDay(t)} style={{background:"none",border:`1px solid ${C.bdr}`,borderRadius:6,color:C.gr,fontSize:9,padding:"2px 7px",cursor:"pointer",fontFamily:FONT,flexShrink:0}}>→ {newDay.slice(0,3)}</button>}
                <button onClick={()=>del(t.id,tab==="day")} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:14,opacity:.6}}>×</button>
              </div>
            ))}
          </>
        )}

        {tab==="note"&&(
          <div>
            <div style={{fontSize:10,color:C.gr,marginBottom:8}}>Free-form notes, planning, paste things here...</div>
            <textarea value={noteText} onChange={e=>saveNote(e.target.value)} spellCheck={true}
              placeholder="Write your notes here — paste from anywhere, plan your week, organize thoughts..."
              style={{...ta(C.g),minHeight:"60vh",lineHeight:1.7,fontSize:13}}/>
          </div>
        )}
      </div>
    </div>
  );
}

// GOALS + VISION BOARD + DUA
// ════════════════════════════════════════════════════════════════
function Goals({ goals, setGoals }) {
  const [tab, setTab] = React.useState("goals");
  const [newG, setNewG] = React.useState(""); const [cat, setCat] = React.useState("fitness");
  const [dua, setDua] = useStore("ultimate_dua", "");
  const CATS = [["fitness","💪 Fitness","#34d399"],["spiritual","🕌 Spiritual","#fbbf24"],["career","💻 Career","#a78bfa"],["business","💼 Business","#f87171"],["social","👥 Social","#60a5fa"],["personal","🧠 Personal","#f472b6"]];

  function add(){if(!newG.trim())return;setGoals([{id:Date.now(),text:newG.trim(),cat,done:false},...goals]);setNewG("");}
  function toggle(id){setGoals(goals.map(g=>g.id===id?{...g,done:!g.done}:g));}
  function del(id){setGoals(goals.filter(g=>g.id!==id));}

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 14px"}}>
        <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:3}}>Vision & Goals</div>
        <div style={{display:"flex",gap:5}}>
          {[["goals","🎯 Goals"],["dua","🤲 Ultimate Dua"]].map(([v,l])=>(
            <button key={v} onClick={()=>setTab(v)} style={{...btn(C.a,tab!==v),padding:"5px 12px",fontSize:11}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{padding:"13px 14px 0"}}>
        {tab==="goals"&&(<>
          <select value={cat} onChange={e=>setCat(e.target.value)} style={{...inp(C.a),marginBottom:7}}>
            {CATS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
          <div style={{display:"flex",gap:7,marginBottom:16}}>
            <input value={newG} onChange={e=>setNewG(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Add a goal..." style={{...inp(C.a),flex:1}} spellCheck={true}/>
            <button onClick={add} style={{...btn(C.a),padding:"8px 14px"}}>+</button>
          </div>
          {CATS.map(([v,l,cc])=>{const cg=goals.filter(g=>g.cat===v);if(cg.length===0)return null;return(
            <div key={v} style={{marginBottom:14}}>
              <div style={{fontSize:9,color:cc,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:7}}>{l}</div>
              {cg.map(g=>(
                <div key={g.id} style={{display:"flex",gap:9,padding:"9px 13px",background:C.card,border:`1px solid ${cc}22`,borderLeft:`3px solid ${cc}`,borderRadius:10,marginBottom:6,opacity:g.done?.4:1}}>
                  <button onClick={()=>toggle(g.id)} style={{width:16,height:16,borderRadius:4,flexShrink:0,marginTop:1,border:`1.5px solid ${g.done?cc:cc+"44"}`,background:g.done?cc:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {g.done&&<span style={{color:C.bg,fontSize:10,fontWeight:900}}>✓</span>}
                  </button>
                  <span style={{flex:1,fontSize:12,color:C.text,textDecoration:g.done?"line-through":"none"}}>{g.text}</span>
                  <button onClick={()=>del(g.id)} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:13,opacity:.6}}>×</button>
                </div>
              ))}
            </div>
          );})}
          {goals.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:C.gr,fontSize:12}}>No goals yet. Start building your vision.</div>}
        </>)}

        {tab==="dua"&&(
          <div>
            <div style={{fontSize:10,color:C.gr,marginBottom:8}}>Write your ultimate dua here — read this every morning at the mosque</div>
            <textarea value={dua} onChange={e=>setDua(e.target.value)} spellCheck={true}
              placeholder="In the name of Allah, the Most Gracious, the Most Merciful...&#10;&#10;Write your deepest duas here. Be specific. Ask for exactly what you want.&#10;&#10;Ask for:&#10;- Deen&#10;- Dunya&#10;- Akhira&#10;- Your family&#10;- Your future wife&#10;- Your business&#10;- Your health&#10;- Your knowledge&#10;..."
              style={{...ta(C.a),minHeight:"70vh",lineHeight:1.8,fontSize:14}}/>
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// 75 HARD TRACKER
// ════════════════════════════════════════════════════════════════
function Hard75({ hard75, setHard75, hard75Streak, setHard75Streak }) {
  const tasks = hard75.tasks || HARD75_DEFAULT;
  const todayKey = new Date().toDateString();
  const todayData = hard75.daily?.[todayKey] || {};
  const [editTasks, setEditTasks] = React.useState(false);
  const [tasksText, setTasksText] = React.useState(tasks.join("\n"));

  function toggle(i) {
    const wasDone = todayData[i];
    const next = {...hard75, daily:{...(hard75.daily||{}), [todayKey]:{...todayData,[i]:!wasDone}}};
    setHard75(next);
  }

  function saveTasks() {
    const newTasks = tasksText.split("\n").map(t=>t.trim()).filter(Boolean);
    setHard75({...hard75, tasks:newTasks});
    setEditTasks(false);
  }

  function completeDay() {
    const done = tasks.filter((_,i)=>todayData[i]).length;
    if (done<tasks.length) { alert("Complete all tasks first!"); return; }
    setHard75Streak((hard75Streak||0)+1);
    alert(`Day ${(hard75Streak||0)+1} complete! 🔥 Keep going!`);
  }

  function restart() {
    if (window.confirm("Restart 75 Hard? This will reset your streak.")) {
      setHard75Streak(0);
      setHard75({...hard75, daily:{}});
    }
  }

  const done = tasks.filter((_,i)=>todayData[i]).length;
  const pct = tasks.length>0 ? Math.round(done/tasks.length*100) : 0;

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,paddingBottom:40}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.r}33`,padding:"13px 14px"}}>
        <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:3}}>Discipline</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:800,color:C.w}}>🔥 75 Hard</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setEditTasks(e=>!e)} style={{...btn(C.gr,true),padding:"5px 10px",fontSize:10}}>{editTasks?"✓ Done":"✏️ Edit"}</button>
            <button onClick={restart} style={{...btn(C.r,true),padding:"5px 10px",fontSize:10}}>↺ Reset</button>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {/* Streak */}
        <div style={{textAlign:"center",background:`${C.r}12`,border:`1px solid ${C.r}33`,borderRadius:16,padding:"24px",marginBottom:16}}>
          <div style={{fontSize:52,fontWeight:900,color:C.r}}>{hard75Streak||0}</div>
          <div style={{fontSize:12,color:C.text}}>Day{hard75Streak!==1?"s":""} complete</div>
          <div style={{fontSize:10,color:C.gr,marginTop:4}}>75 days of absolute discipline</div>
        </div>

        {/* Today progress */}
        <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,height:6,overflow:"hidden",marginBottom:8}}>
          <div style={{height:"100%",width:`${pct}%`,background:C.r,transition:"width .4s"}}/>
        </div>
        <div style={{fontSize:11,color:C.text,marginBottom:14}}>{done}/{tasks.length} complete today — {pct}%</div>

        {/* Task edit mode */}
        {editTasks&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:C.gr,marginBottom:6}}>One task per line:</div>
            <textarea value={tasksText} onChange={e=>setTasksText(e.target.value)} style={{...ta(C.r),minHeight:180,marginBottom:8}} spellCheck={true}/>
            <button onClick={saveTasks} style={{...btn(C.r),width:"100%",padding:"10px"}}>Save Tasks</button>
          </div>
        )}

        {/* Task checklist */}
        {tasks.map((task,i)=>(
          <div key={i} onClick={()=>toggle(i)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.card,border:`1px solid ${todayData[i]?C.r+"44":C.bdr}`,borderRadius:10,marginBottom:8,cursor:"pointer",opacity:todayData[i]?.7:1}}>
            <div style={{width:20,height:20,borderRadius:5,flexShrink:0,border:`2px solid ${todayData[i]?C.r:C.dim}`,background:todayData[i]?C.r:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {todayData[i]&&<span style={{color:C.bg,fontSize:12,fontWeight:900}}>✓</span>}
            </div>
            <span style={{fontSize:13,color:C.text,textDecoration:todayData[i]?"line-through":"none"}}>{task}</span>
          </div>
        ))}

        {done===tasks.length&&tasks.length>0&&(
          <button onClick={completeDay} style={{...btn(C.r),width:"100%",padding:"14px",fontSize:14,marginTop:8}}>
            🔥 Mark Day {(hard75Streak||0)+1} Complete!
          </button>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// NAV BAR
// ════════════════════════════════════════════════════════════════
function NavBar({ screen, nav }) {
  const ITEMS = [
    {id:SC.home,icon:"🏠",label:"Home",c:C.b},
    {id:SC.week,icon:"📅",label:"Schedule",c:C.g},
    {id:SC.subjects,icon:"📁",label:"Subjects",c:C.p},
    {id:SC.todo,icon:"✅",label:"To-Do",c:C.g},
    {id:SC.goals,icon:"🎯",label:"Goals",c:C.a},
  ];
  const isA = (id) => screen===id||(screen===SC.day&&id===SC.week)||(screen===SC.subject&&id===SC.subjects)||(screen===SC.hard75&&id===SC.home);
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surf,borderTop:`1px solid ${C.bdr}`,display:"flex",zIndex:100}}>
      {ITEMS.map(item=>{
        const on = isA(item.id);
        return (
          <button key={item.id} onClick={()=>nav(item.id)} style={{flex:1,background:"none",border:"none",borderTop:`2px solid ${on?item.c:"transparent"}`,padding:"9px 4px 7px",fontSize:8,cursor:"pointer",color:on?item.c:C.gr,fontFamily:FONT,display:"flex",flexDirection:"column",alignItems:"center",gap:2,letterSpacing:.3,textTransform:"uppercase"}}>
            <span style={{fontSize:17}}>{item.icon}</span>{item.label}
          </button>
        );
      })}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════════
function App() {
  const [auth, setAuth] = React.useState(false);
  const [screen, setScreen] = React.useState(SC.home);
  const [dayIdx, setDayIdx] = React.useState(null);
  const [subjectId, setSubjectId] = React.useState(null);
  const [prevScreen, setPrevScreen] = React.useState(null);
  const [schedData, setSchedData] = React.useState(null);
  const [checks, setChecks] = useStore("chk_v4", {});
  const [todos, setTodos] = useStore("todos_v4", {});
  const [goals, setGoals] = useStore("goals_v4", []);
  const [subjects, setSubjects] = useStore("subjects_v4", DEFAULT_SUBJECTS);
  const [events, setEvents] = useStore("events_v4", {});
  const [hard75, setHard75] = useStore("hard75_v4", {});
  const [hard75Streak, setHard75Streak] = useStore("hard75streak_v4", 0);
  const [affirmation, setAffirmation] = useStore("aff_v4", DEFAULT_AFF);

  React.useEffect(function() {
    dbGet("sched_v4").then(function(r) {
      try { setSchedData(r ? JSON.parse(r) : buildSchedule()); }
      catch(e) { setSchedData(buildSchedule()); }
    }).catch(function() { setSchedData(buildSchedule()); });
  }, []);

  function setSchedule(next) {
    setSchedData(next);
    dbSet("sched_v4", next).catch(()=>{});
  }

  function nav(dest) {
    if (dest.startsWith("subject:")) {
      setSubjectId(dest.replace("subject:",""));
      setScreen(SC.subject);
    } else {
      setScreen(dest);
    }
  }

  if (!auth) return <Lock onOk={()=>setAuth(true)}/>;

  if (!schedData) return (
    <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.w,fontFamily:FONT,fontSize:13}}>
      Loading your Life OS...
    </div>
  );

  const hideNav = screen===SC.subject;

  return (
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:hideNav?0:58}}>
      {screen===SC.home&&<Home nav={nav} checks={checks} schedule={schedData} todos={todos} setTodos={setTodos} hard75={hard75} setHard75={setHard75} hard75Streak={hard75Streak} setHard75Streak={setHard75Streak} affirmation={affirmation} setAffirmation={setAffirmation}/>}
      {screen===SC.week&&<Week onDayClick={(i)=>{setDayIdx(i);setScreen(SC.day);}} checks={checks} schedule={schedData} events={events} setEvents={setEvents}/>}
      {screen===SC.day&&dayIdx!==null&&<Day dayIdx={dayIdx} checks={checks} setChecks={setChecks} schedule={schedData} setSchedule={setSchedule} nav={nav} events={events} subjects={subjects}/>}
      {screen===SC.subjects&&<SubjectsGrid nav={nav} subjects={subjects} setSubjects={setSubjects} prevScreen={prevScreen} setPrevScreen={setPrevScreen}/>}
      {screen===SC.subject&&subjectId&&<SubjectPage subjectId={subjectId} nav={nav} subjects={subjects} setSubjects={setSubjects} prevScreen={prevScreen}/>}
      {screen===SC.todo&&<Todo todos={todos} setTodos={setTodos}/>}
      {screen===SC.goals&&<Goals goals={goals} setGoals={setGoals}/>}
      {screen===SC.hard75&&<Hard75 hard75={hard75} setHard75={setHard75} hard75Streak={hard75Streak} setHard75Streak={setHard75Streak}/>}
      {!hideNav&&<NavBar screen={screen} nav={nav}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
