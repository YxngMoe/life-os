// ── TIME HELPERS ──────────────────────────────────────────────
function timeToMin(t){
  if(!t)return 0;
  const[h,m]=(t||"0:0").split(":").map(Number);
  return h*60+(m||0);
}
function getMondayOf(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  const mon=new Date(d);
  mon.setDate(diff); mon.setHours(0,0,0,0);
  return mon;
}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function fmtDate(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}

// ── STORAGE ───────────────────────────────────────────────────
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
async function dbGet(k){if(!SB_ON)return null;try{const r=await fetch(SB_URL+"/rest/v1/life_os?key=eq."+encodeURIComponent(k)+"&select=value",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});const d=await r.json();return d[0]?d[0].value:null;}catch(e){return null;}}
async function dbSet(k,v){if(!SB_ON)return;try{await fetch(SB_URL+"/rest/v1/life_os",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},body:JSON.stringify({key:k,value:JSON.stringify(v)})});}catch(e){}}
function useStore(key,init){
  const[v,sv]=React.useState(function(){const s=lsGet(key);if(s)try{return JSON.parse(s);}catch(e){}return init;});
  React.useEffect(function(){dbGet(key).then(function(r){if(r)try{sv(JSON.parse(r));}catch(e){}}).catch(function(){});},[key]);
  const set=React.useCallback(function(val){sv(val);lsSet(key,val);dbSet(key,val);},[key]);
  return[v,set];
}

// ── LINK RENDER ───────────────────────────────────────────────
function renderText(text){
  const re=/\[([^\]]+)\]\(([^)]+)\)/g;
  const parts=[];let last=0,m;
  while((m=re.exec(text))!==null){if(m.index>last)parts.push(text.slice(last,m.index));parts.push(React.createElement("a",{key:m.index,href:m[2],target:"_blank",rel:"noopener noreferrer",style:{color:C.b,textDecoration:"underline"},onClick:e=>e.stopPropagation()},m[1]));last=m.index+m[0].length;}
  if(last<text.length)parts.push(text.slice(last));
  return parts.length>1?parts:text;
}

// PIN LOCK
// ══════════════════════════════════════════
function Lock({onOk}){
  const[digits,setDigits]=React.useState([]);
  const[shake,setShake]=React.useState(false);
  function press(d){
    if(digits.length>=4)return;
    const next=[...digits,d];setDigits(next);
    if(next.length===4){if(next.join("")===PIN){setTimeout(()=>onOk(),120);}else{setShake(true);setTimeout(()=>{setDigits([]);setShake(false);},600);}}
  }
  return(
    <div style={{background:`linear-gradient(160deg,${C.bg},#0a1428)`,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FONT}}>
      <div style={{textAlign:"center",padding:"36px 20px",maxWidth:280,width:"100%"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔒</div>
        <div style={{fontSize:26,fontWeight:800,color:C.w,letterSpacing:-1,marginBottom:2}}>Mohamed</div>
        <div style={{fontSize:10,color:C.gr,marginBottom:32,letterSpacing:2,textTransform:"uppercase"}}>Life Operating System</div>
        <div style={{display:"flex",gap:14,justifyContent:"center",marginBottom:36,transition:"transform .15s",transform:shake?"translateX(8px)":"none"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:16,height:16,borderRadius:"50%",background:digits[i]!==undefined?C.b:"transparent",border:`2px solid ${digits[i]!==undefined?C.b:C.bdr}`,transition:"all .15s"}}/>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>
            k===""?<div key={i}/>:
            <button key={i} onClick={()=>k==="⌫"?setDigits(d=>d.slice(0,-1)):press(k)}
              style={{background:k==="⌫"?C.card:C.card2,border:`1px solid ${C.bdr}`,borderRadius:14,padding:"16px 8px",fontSize:k==="⌫"?18:22,fontWeight:700,color:C.w,cursor:"pointer",fontFamily:FONT}}>
              {k}
            </button>
          )}
        </div>
        {shake&&<div style={{color:C.r,fontSize:12,marginTop:16}}>Incorrect PIN</div>}
      </div>
    </div>
  );
}

              <div style={{fontSize:15,marginBottom:2}}>{m.emoji}</div>
              <div style={{fontSize:8,color:m.color,fontWeight:700,letterSpacing:.8,marginBottom:1,textTransform:"uppercase"}}>{m.label}</div>
              {editMetrics?<input value={m.value} onChange={e=>updateMet(m.id,e.target.value)} style={{...ip(m.color),padding:"2px 5px",fontSize:10}}/>
              :<div style={{fontSize:11,color:C.text}}>{m.id==="streak"?`${hard75Streak||0} days`:m.value}</div>}
            </div>
          ))}
        </div>
        {editMetrics&&<button onClick={addMet} style={{...sb(C.b,true),fontSize:10,padding:"5px 12px"}}>+ Add Metric</button>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════
// WEEK CALENDAR — accurate time blocks with dates
// ══════════════════════════════════════════
function Week({onDayClick,checks,schedule,events,setEvents}){
  const today=new Date();
  const[weekStart,setWeekStart]=React.useState(()=>getMondayOf(today));
  const[addingTo,setAddingTo]=React.useState(null);
  const[evText,setEvText]=React.useState("");
  const[evTime,setEvTime]=React.useState("09:00");
  const tiToday=today.getDay()===0?6:today.getDay()-1;
  const isThisWeek=getMondayOf(today).getTime()===weekStart.getTime();

  // Day starts 5am, ends midnight = 19 hours = 1140 min
  const DAY_START=5*60; // 5:00am in minutes
  const DAY_END=24*60;  // midnight
  const TOTAL_MIN=DAY_END-DAY_START;
  const COL_H=480; // px height of each column

  function minToY(t){return Math.max(0,((t-DAY_START)/TOTAL_MIN)*COL_H);}
  function minToH(s,e){return Math.max(8,((e-s)/TOTAL_MIN)*COL_H);}

  function addEvent(di){
    if(!evText.trim())return;
    const ev={id:Date.now(),text:evText.trim(),time:evTime,color:WM[di].color};
    setEvents({...events,[di]:[...(events[di]||[]),ev]});
    setEvText("");setAddingTo(null);
  }

  // Time labels on left axis
  const TIME_LABELS=["5AM","6AM","7AM","8AM","9AM","10AM","11AM","12PM","1PM","2PM","3PM","4PM","5PM","6PM","7PM","8PM","9PM","10PM","11PM"];

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 14px",position:"sticky",top:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
          <button onClick={()=>setWeekStart(d=>addDays(d,-7))} style={{...sb(C.gr,true),padding:"4px 10px",fontSize:12}}>←</button>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.w}}>{fmtDate(weekStart)} — {fmtDate(addDays(weekStart,6))}</div>
            {!isThisWeek&&<button onClick={()=>setWeekStart(getMondayOf(today))} style={{background:"none",border:"none",color:C.b,fontSize:10,cursor:"pointer",fontFamily:FONT}}>Today</button>}
          </div>
          <button onClick={()=>setWeekStart(d=>addDays(d,7))} style={{...sb(C.gr,true),padding:"4px 10px",fontSize:12}}>→</button>
        </div>
        <div style={{fontSize:9,color:C.gr,textAlign:"center"}}>Tap any day → full routine · tap + to add event</div>
      </div>

      <div style={{overflowX:"auto",paddingBottom:20}}>
        <div style={{minWidth:520,padding:"0 4px"}}>
          {/* Day headers + progress */}
          <div style={{display:"grid",gridTemplateColumns:"32px repeat(7,1fr)",gap:2,padding:"8px 0 4px",position:"sticky",top:64,background:C.bg,zIndex:10}}>
            <div/>
            {WM.map((d,i)=>{
              const dayDate=addDays(weekStart,i);
              const isToday=isThisWeek&&i===tiToday;
              const{done,total}=schedule[i]?(()=>{let t=0,dn=0;schedule[i].blocks.forEach((b,bi)=>b.items.forEach((_,ii)=>{t++;if(checks[`${i}-${bi}-${ii}`])dn++;}));return{done:dn,total:t};})():{done:0,total:0};
              const dayEvs=events[i]||[];
              return(
                <div key={i} style={{display:"flex",flexDirection:"column",gap:2}}>
                  <div onClick={()=>onDayClick(i)} style={{background:isToday?`${d.color}18`:C.card,border:`1.5px solid ${isToday?d.color+"77":C.bdr}`,borderRadius:10,padding:"6px 3px",textAlign:"center",cursor:"pointer"}}>
                    <div style={{fontSize:8,color:isToday?d.color:C.gr,fontWeight:700}}>{d.short}</div>
                    <div style={{fontSize:9,color:isToday?d.color:C.dim}}>{fmtDate(dayDate)}</div>
                    <div style={{fontSize:14,margin:"2px 0"}}>{d.emoji}</div>
                    {isToday&&<div style={{fontSize:7,color:d.color,fontWeight:700}}>TODAY</div>}
                    {total>0&&<div style={{fontSize:7,color:d.color,fontWeight:600}}>{Math.round(done/total*100)}%</div>}
                    <div style={{background:"rgba(255,255,255,0.05)",borderRadius:3,height:2.5,margin:"3px 3px 0",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${total>0?Math.round(done/total*100):0}%`,background:d.color}}/>
                    </div>
                  </div>
                  {dayEvs.map(ev=>(
                    <div key={ev.id} onClick={()=>onDayClick(i)} style={{background:`${ev.color}22`,border:`1px solid ${ev.color}55`,borderRadius:5,padding:"2px 3px",cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontSize:7,color:ev.color,fontWeight:700}}>{ev.time}</div>
                      <div style={{fontSize:7,color:C.text,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{ev.text}</div>
                    </div>
                  ))}
                  <button onClick={e=>{e.stopPropagation();setAddingTo(i);}} style={{background:"transparent",border:`1px dashed ${d.color}44`,borderRadius:5,padding:"1px",color:d.color,fontSize:10,cursor:"pointer",fontFamily:FONT}}>+</button>
                </div>
              );
            })}
          </div>

          {/* Time axis + blocks */}
          <div style={{display:"grid",gridTemplateColumns:"32px repeat(7,1fr)",gap:2}}>
            {/* Left time axis */}
            <div style={{position:"relative",height:COL_H}}>
              {TIME_LABELS.map((lbl,i)=>(
                <div key={i} style={{position:"absolute",right:3,fontSize:7,color:C.dim,transform:"translateY(-50%)",top:`${(i/19)*COL_H}px`,whiteSpace:"nowrap"}}>{lbl}</div>
              ))}
            </div>

            {/* Day columns with actual time blocks */}
            {WM.map((d,di)=>{
              const isToday=isThisWeek&&di===tiToday;
              const nowMin=isToday?today.getHours()*60+today.getMinutes():null;
              const dayBlocks=schedule[di]?.blocks||[];

              return(
                <div key={di} onClick={()=>onDayClick(di)} style={{position:"relative",height:COL_H,background:C.card,borderRadius:8,overflow:"hidden",cursor:"pointer",border:`1px solid ${isToday?d.color+"33":C.bdr}`}}>
                  {/* Hour grid lines */}
                  {TIME_LABELS.map((_,i)=>(
                    <div key={i} style={{position:"absolute",top:`${(i/19)*COL_H}px`,left:0,right:0,borderTop:`1px solid ${C.bdr}`,opacity:.4}}/>
                  ))}
                  {/* Schedule blocks */}
                  {dayBlocks.map((block,bi)=>{
                    const s=timeToMin(block.t);
                    const e=timeToMin(block.e)||Math.min(s+60,DAY_END);
                    if(s<DAY_START||s>=DAY_END)return null;
                    const y=minToY(s);
                    const h=minToH(s,Math.min(e,DAY_END));
                    const cc=CAT[block.cat]?.c||C.gr;
                    const bDone=block.items.filter((_,ii)=>checks[`${di}-${bi}-${ii}`]).length;
                    const allDone=bDone===block.items.length&&block.items.length>0;
                    const isNow=isToday&&nowMin&&nowMin>=s&&nowMin<e;
                    return(
                      <div key={bi} style={{position:"absolute",top:y,left:1,right:1,height:Math.max(h,8),background:`${cc}${isNow?"44":"22"}`,borderLeft:`2px solid ${cc}${isToday?"cc":"33"}`,borderRadius:3,overflow:"hidden",display:"flex",alignItems:"flex-start",padding:"1px 2px",border:isNow?`1px solid ${cc}88`:"none",boxShadow:isNow?`0 0 8px ${cc}55`:"none"}}>
                        {h>12&&<div style={{fontSize:6,color:cc,fontWeight:700,lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>
                          {allDone?"✓ ":""}{block.emoji} {block.title}
                        </div>}
                      </div>
                    );
                  })}
                  {/* Current time line */}
                  {isToday&&nowMin&&nowMin>=DAY_START&&nowMin<DAY_END&&(
                    <div style={{position:"absolute",top:minToY(nowMin),left:0,right:0,height:2,background:d.color,zIndex:5,boxShadow:`0 0 6px ${d.color}`}}>
                      <div style={{position:"absolute",left:0,top:-3,width:7,height:7,borderRadius:"50%",background:d.color}}/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Add event modal */}
      {addingTo!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}} onClick={()=>setAddingTo(null)}>
          <div style={{background:C.card,borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:480}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:14,fontWeight:700,color:WM[addingTo].color,marginBottom:14}}>Add event — {WM[addingTo].name}</div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input type="time" value={evTime} onChange={e=>setEvTime(e.target.value)} style={{...ip(WM[addingTo].color),width:100,flexShrink:0}}/>
              <input value={evText} onChange={e=>setEvText(e.target.value)} placeholder="Dentist, blood test..." style={ip(WM[addingTo].color)} autoFocus onKeyDown={e=>e.key==="Enter"&&addEvent(addingTo)}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>addEvent(addingTo)} style={{...sb(WM[addingTo].color),flex:1}}>Add to Calendar</button>
              <button onClick={()=>setAddingTo(null)} style={sb(WM[addingTo].color,true)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// DAY DETAIL
// ══════════════════════════════════════════
function Day({dayIdx,checks,setChecks,schedule,setSchedule,nav,events,subjects}){
  const[collapsed,setCollapsed]=useStore("col_v5",{});
  const[editMode,setEditMode]=React.useState(false);
  const[fullTextEdit,setFullTextEdit]=React.useState(null);
  const[fullText,setFullText]=React.useState("");
  const[editItem,setEditItem]=React.useState(null);
  const[editText,setEditText]=React.useState("");
  const[addTo,setAddTo]=React.useState(null);
  const[addText,setAddText]=React.useState("");
  const[editTitle,setEditTitle]=React.useState(null);
  const[editTitleText,setEditTitleText]=React.useState("");
  const[editTime,setEditTime]=React.useState(null);
  const[editTimeText,setEditTimeText]=React.useState("");
  const[addInsert,setAddInsert]=React.useState(null);
  const[insertText,setInsertText]=React.useState("");

  const day=schedule[dayIdx];const meta=WM[dayIdx];
  if(!day||!meta)return null;
  const{done,total}=(()=>{let t=0,d=0;day.blocks.forEach((b,bi)=>b.items.forEach((_,ii)=>{t++;if(checks[`${dayIdx}-${bi}-${ii}`])d++;}));return{done:d,total:t};})();
  const dayEvs=events[dayIdx]||[];
  const upd=(fn)=>setSchedule(schedule.map((d,di)=>di!==dayIdx?d:{...d,blocks:fn(d.blocks)}));

  function togChk(bi,ii){const k=`${dayIdx}-${bi}-${ii}`;setChecks({...checks,[k]:!checks[k]});}
  function saveItem(){if(!editItem||!editText.trim()){setEditItem(null);return;}upd(bs=>bs.map((b,bI)=>bI!==editItem.bi?b:{...b,items:b.items.map((it,iI)=>iI===editItem.ii?editText.trim():it)}));setEditItem(null);setEditText("");}
  function delItem(bi,ii){upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,items:b.items.filter((_,iI)=>iI!==ii)}));setEditItem(null);}
  function addItem(bi){if(!addText.trim()){setAddTo(null);return;}upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,items:[...b.items,addText.trim()]}));setAddText("");setAddTo(null);}
  function insertItem(bi,ii){if(!insertText.trim()){setAddInsert(null);return;}upd(bs=>bs.map((b,bI)=>{if(bI!==bi)return b;const items=[...b.items];items.splice(ii,0,insertText.trim());return{...b,items};}));setInsertText("");setAddInsert(null);}
  function moveItem(bi,ii,dir){upd(bs=>bs.map((b,bI)=>{if(bI!==bi)return b;const items=[...b.items];const ni=ii+dir;if(ni<0||ni>=items.length)return b;[items[ii],items[ni]]=[items[ni],items[ii]];return{...b,items};}));}
  function saveTitle(bi){if(!editTitleText.trim()){setEditTitle(null);return;}upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,title:editTitleText.trim()}));setEditTitle(null);setEditTitleText("");}
  function saveTime(bi){if(!editTimeText.trim()){setEditTime(null);return;}upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,t:editTimeText.trim()}));setEditTime(null);setEditTimeText("");}
  function delBlock(bi){upd(bs=>bs.filter((_,bI)=>bI!==bi));}
  function addBlock(){upd(bs=>[...bs,{id:"nb"+Date.now(),t:"12:00",e:"13:00",title:"New Block",cat:"study",emoji:"📝",items:["New item"]}]);}
  function openFullEdit(bi){setFullText(day.blocks[bi].items.join("\n"));setFullTextEdit(bi);}
  function saveFullEdit(){if(fullTextEdit===null)return;const items=fullText.split("\n").map(l=>l.trim()).filter(Boolean);upd(bs=>bs.map((b,bI)=>bI!==fullTextEdit?b:{...b,items}));setFullTextEdit(null);setFullText("");}

  const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,paddingBottom:40}}>
      {fullTextEdit!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:300,display:"flex",flexDirection:"column",fontFamily:FONT}}>
          <div style={{background:C.surf,padding:"13px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.bdr}`}}>
            <button onClick={()=>setFullTextEdit(null)} style={{...sb(C.gr,true),padding:"5px 10px",fontSize:11}}>Cancel</button>
            <div style={{flex:1,fontSize:13,fontWeight:700,color:C.w}}>📝 Edit Block — one item per line</div>
            <button onClick={saveFullEdit} style={{...sb(C.g),padding:"5px 14px",fontSize:11}}>Save</button>
          </div>
          <div style={{padding:"10px 14px",fontSize:9,color:C.gr}}>One line = one checklist item · Lines starting with "──" become headers · "  " indent = sub-item</div>
          <textarea value={fullText} onChange={e=>setFullText(e.target.value)} autoFocus spellCheck={true}
            style={{flex:1,background:"transparent",border:"none",color:C.text,fontSize:13,fontFamily:FONT,lineHeight:1.8,padding:"0 16px 16px",outline:"none",resize:"none"}}/>
        </div>
      )}
      <div style={{background:C.surf,borderBottom:`1px solid ${meta.color}22`,padding:"13px 14px 11px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:9}}>
          <button onClick={()=>nav(SC.week)} style={{...sb(meta.color,true),padding:"5px 11px",fontSize:11}}>← Week</button>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800,color:meta.color}}>{meta.emoji} {meta.name}</div>
            <div style={{fontSize:9,color:C.gr}}>{meta.theme}</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{fontSize:10,color:C.gr}}>{total>0?Math.round(done/total*100):0}% · {done}/{total}</div>
            <button onClick={()=>setEditMode(e=>!e)} style={{...sb(editMode?C.g:C.gr,!editMode),padding:"4px 10px",fontSize:10}}>{editMode?"✓ Done":"✏️ Edit"}</button>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",borderRadius:4,height:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${total>0?Math.round(done/total*100):0}%`,background:meta.color,transition:"width .4s"}}/>
        </div>
      </div>
      <div style={{padding:"10px 12px 0"}}>
        {dayEvs.length>0&&(
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,color:C.gr,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>📌 Events</div>
            {dayEvs.map(ev=>(
              <div key={ev.id} style={{background:`${ev.color}18`,border:`2px solid ${ev.color}55`,borderRadius:10,padding:"9px 13px",marginBottom:5,display:"flex",gap:10}}>
                <span style={{fontSize:11,fontWeight:700,color:ev.color}}>{ev.time}</span>
                <span style={{fontSize:12,color:C.w,fontWeight:600}}>{ev.text}</span>
              </div>
            ))}
          </div>
        )}
        {day.blocks.map((block,bi)=>{
          const cc=CAT[block.cat]?.c||C.gr;
          const ck=`${dayIdx}-${bi}`;
          const isCol=collapsed[ck];
          const bDone=block.items.filter((_,ii)=>checks[`${dayIdx}-${bi}-${ii}`]).length;
          const allDone=bDone===block.items.length&&block.items.length>0;
          const blockStart=timeToMin(block.t);const blockEnd=timeToMin(block.e)||blockStart+60;
          const isNow=nowMin>=blockStart&&nowMin<blockEnd;
          return(
            <div key={block.id||bi} style={{display:"flex",gap:0,marginBottom:6}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:22,flexShrink:0}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:allDone?cc:isNow?cc:"transparent",border:`2px solid ${cc}`,flexShrink:0,marginTop:13,zIndex:1,boxShadow:isNow?`0 0 8px ${cc}`:"none"}}/>
                {bi<day.blocks.length-1&&<div style={{width:1,flex:1,background:`${cc}20`,marginTop:2}}/>}
              </div>
              <div style={{flex:1,background:isNow?`${cc}08`:C.card,border:`1px solid ${isNow?cc+"44":cc+"18"}`,borderLeft:`3px solid ${cc}`,borderRadius:12,overflow:"hidden",boxShadow:isNow?`0 0 12px ${cc}22`:"none"}}>
                <div style={{padding:"8px 11px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4,flexWrap:"wrap"}}>
                    {editMode&&editTime===bi?(
                      <input value={editTimeText} onChange={e=>setEditTimeText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveTime(bi)} autoFocus style={{...ip(cc),width:70,padding:"2px 6px",fontSize:10}}/>
                    ):(
                      <span style={bg(cc)} onClick={()=>editMode&&(setEditTime(bi),setEditTimeText(block.t))}>{block.t}</span>
                    )}
                    {block.e&&<span style={{fontSize:8,color:C.dim}}>→{block.e}</span>}
                    {block.loc&&<span style={{fontSize:8,color:C.gr}}>{block.loc}</span>}
                    {block.water&&<span style={{fontSize:8,color:"#38bdf8",fontWeight:700}}>💧×{block.water}</span>}
                    {isNow&&<span style={{fontSize:8,color:cc,fontWeight:700,background:`${cc}20`,padding:"1px 6px",borderRadius:10}}>NOW</span>}
                    <div style={{marginLeft:"auto",display:"flex",gap:2}}>
                      <span style={{fontSize:8,color:C.gr,opacity:.6}}>{bDone}/{block.items.length}</span>
                      {editMode&&<>
                        <button onClick={()=>openFullEdit(bi)} style={{background:"none",border:"none",color:C.p,cursor:"pointer",fontSize:10,padding:"0 2px"}}>📝</button>
                        <button onClick={()=>delBlock(bi)} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:10,padding:"0 2px",opacity:.7}}>🗑</button>

                      <button onClick={()=>setCollapsed(c=>({...c,[ck]:!c[ck]}))} style={{background:"none",border:"none",color:C.gr,cursor:"pointer",fontSize:11,padding:"0 2px"}}>{isCol?"▶":"▼"}</button>
                    </div>
                  </div>
                  {editTitle===bi?(
                    <div>

                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>saveTitle(bi)} style={{...sb(cc),padding:"3px 10px",fontSize:10}}>Save</button>

                  ):(
                    <div onClick={()=>editMode&&(setEditTitle(bi),setEditTitleText(block.title))} style={{display:"flex",alignItems:"center",gap:6,cursor:editMode?"text":"pointer"}}>

                      <span style={{fontSize:12,fontWeight:700,color:allDone?C.dim:C.w,textDecoration:allDone?"line-through":"none"}}>{block.title}</span>

                    </div>
                  )}
                  {editMode&&(
                    <div style={{marginTop:5,display:"flex",gap:5,flexWrap:"wrap"}}>
                      <select value={block.cat} onChange={e=>upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,cat:e.target.value}))} style={{...ip(cc),padding:"2px 5px",fontSize:10,width:"auto"}}>
                        {Object.keys(CAT).map(k=><option key={k} value={k}>{k}</option>)}
                      </select>
                      <select value={block.subjectLink||""} onChange={e=>upd(bs=>bs.map((b,bI)=>bI!==bi?b:{...b,subjectLink:e.target.value||undefined}))} style={{...ip(cc),padding:"2px 5px",fontSize:10,width:"auto"}}>
                        <option value="">No link</option>
                        {subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                      </select>
                    </div>
                  )}
                </div>
                {!isCol&&(
                  <div style={{padding:"0 11px 9px"}}>
                    {block.items.map((item,ii)=>{
                      const k=`${dayIdx}-${bi}-${ii}`;
                      const isDone=!!checks[k];
                      const isEd=editItem?.bi===bi&&editItem?.ii===ii;
                      const isLabel=item.startsWith("──");

  function addPage(){if(!newPgN.trim())return;setPages([...pages,{id:"p"+Date.now(),name:newPgN.trim(),content:""}]);setPageIdx(pages.length);setNewPgN("");setAddPg(false);}
  function delPage(i){if(pages.length===1)return;setPages(pages.filter((_,pi)=>pi!==i));setPageIdx(0);}
  function addCard(){if(!nQ.trim()||!nA.trim())return;if(isVocab)setVocab([{id:Date.now(),word:nQ.trim(),meaning:nA.trim(),root:"",date:new Date().toLocaleDateString()},...vocab]);else setCards([{id:Date.now(),q:nQ.trim(),a:nA.trim(),date:new Date().toLocaleDateString()},...cards]);setNQ("");setNA("");}
  function addVF(){if(!vF.word.trim()||!vF.meaning.trim())return;setVocab([{id:Date.now(),...vF,date:new Date().toLocaleDateString()},...vocab]);setVF({word:"",root:"",prefix:"",suffix:"",meaning:"",s1:"",s2:"",s3:""});}
  function addW(){if(!wEx.trim())return;setWLogs([{id:Date.now(),ex:wEx.trim(),sets:wSets,note:wNote,date:new Date().toLocaleDateString()},...wLogs]);setWEx("");setWSets("");setWNote("");}
  function startQ(){if(DATA.length<2)return;setQScore({r:0,w:0});nextQ(DATA);setTab("quiz");}
  function nextQ(data){const co=data[Math.floor(Math.random()*data.length)];const wr=data.filter(d=>d.id!==co.id).sort(()=>Math.random()-.5).slice(0,3);setQQ({co,opts:[co,...wr].sort(()=>Math.random()-.5)});setQA(null);}
  function ansQ(opt){setQA(opt.id);setQScore(s=>opt.id===qQ.co.id?{...s,r:s.r+1}:{...s,w:s.w+1});}
  function chkSp(){const w=vocab[si]?.word||"";const ok=spell.trim().toLowerCase()===w.toLowerCase();setSpR(ok?"✓ Correct!":"✗ Wrong — it's: "+w);}
  function delCard(id){isVocab?setVocab(vocab.filter(v=>v.id!==id)):setCards(cards.filter(c=>c.id!==id));}

  const TABS=isVocab?[["notes","Notes"],["add","Add Word"],["flash","Recall"],["quiz","Quiz"],["spell","Spelling"]]:isWorkout?[["notes","Notes"],["log","Log"],["history","History"]]:[["notes","Notes"],["add","Add Q&A"],["flash","Recall"],["quiz","Quiz"]];
  const J_TPLS={"Daily Morning Journal":"🗓️ Date:\n\n1️⃣ PURPOSE REMINDER\nMy purpose right now:\n\n2️⃣ YESTERDAY — PURPOSE CHECK\nToward purpose:\nAway from purpose:\nWhat this teaches me:\n\n3️⃣ YESTERDAY STORY\nSituation:\nChoice I made:\nWhat it says about who I'm becoming:\n\n4️⃣ TODAY — PURPOSE IN ACTION\nToday moves me toward my purpose if I:\nTo-do list:\n1.\n2.\n3.\n\n5️⃣ FAITH CHECK\nOne way I'll practice submission today:\n\n6️⃣ CLOSING LINE\nToday I choose to be the kind of man who:",
    "Daily Recall":"🧬 Huberman / Neuroscience:\n📖 Book:\n💬 Communication:\n🗣️ Vocabulary:\n🕰️ History:\n☪️ Islamic Studies:\n💻 Tech / JPMC:\n💼 Business:\n🧠 Life / Discipline:\n🏋️ Training:",
    "Vocab Entry":"🗓 Word of the Day:\n\n1️⃣ Definition (Your Own Words):\n\n2️⃣ Structure:\nPrefix:\nRoot:\nSuffix:\nMeaning from parts:\n\n3️⃣ Synonyms:\n•\n•\n\n4️⃣ Work Sentence:\n\n5️⃣ Personal Sentence:\n\n6️⃣ Collocation:",
    "LeetCode":"🔤 Vocab:\n1. Term: — Definition:\n2. Term: — Definition:\n\n🧩 Problem A (Guided):\nLink:\nPattern:\nApproach:\nComplexity: T / S\nMistake to avoid:\n\n🎯 Problem B (Blind):\nLink:\nPattern:\nApproach:",
    "Islamic Journal":"[ ] 10 random Islamic questions\n[ ] Time period History Entry\n[ ] Biography Entry\n[ ] Seerah section\n[ ] Hadith Study Entry\n[ ] Fiqh Study Entry\n[ ] Aqeedah Study Entry\n[ ] End with meaningful dua\n[ ] Quran + Arabic with Sheikh",
    "History Bio":"Name:\nEra:\nRegion:\nWhy they matter:\n\nTimeline:\n1.\n2.\n3.\n\n5 Core Questions:\n1. Identity & Role:\n2. Problem / Opportunity:\n3. Principles:\n4. Pivots:\n5. Impact:\n\n60-Second Summary:\n\"[Name] was... My takeaway:\""};

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,paddingBottom:40}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${c}22`,padding:"13px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <button onClick={()=>nav(SC.subjects)} style={{...sb(c,true),padding:"5px 11px",fontSize:11}}>← Back</button>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:800,color:c}}>{subj.emoji} {subj.name}</div>
            <div style={{fontSize:9,color:C.gr}}>{DATA.length} entries · {pages.length} pages</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,overflowX:"auto"}}>
          {TABS.map(([id,lbl])=><button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",borderBottom:`2px solid ${tab===id?c:"transparent"}`,padding:"6px 9px",fontSize:10,cursor:"pointer",color:tab===id?c:C.gr,fontFamily:FONT,whiteSpace:"nowrap"}}>{lbl}</button>)}
        </div>
      </div>
      <div style={{padding:"13px 14px 0"}}>
        {tab==="notes"&&(
          <div>
            <div style={{display:"flex",gap:4,marginBottom:8,overflowX:"auto",alignItems:"center"}}>
              {pages.map((p,i)=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:2}}>
                  <button onClick={()=>setPageIdx(i)} style={{background:pageIdx===i?`${c}20`:"transparent",border:`1px solid ${pageIdx===i?c:C.bdr}`,borderRadius:7,padding:"3px 9px",fontSize:10,color:pageIdx===i?c:C.gr,cursor:"pointer",fontFamily:FONT,whiteSpace:"nowrap"}}>{p.name}</button>
                  {pages.length>1&&<button onClick={()=>delPage(i)} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:10,opacity:.5}}>×</button>}
                </div>
              ))}
              {addPg?(<div style={{display:"flex",gap:4,alignItems:"center"}}>
                <input value={newPgN} onChange={e=>setNewPgN(e.target.value)} placeholder="Page name..." style={{...ip(c),width:110,padding:"3px 7px",fontSize:10}} onKeyDown={e=>e.key==="Enter"&&addPage()} autoFocus/>
                <button onClick={addPage} style={{...sb(c),padding:"3px 8px",fontSize:10}}>Add</button>
                <button onClick={()=>setAddPg(false)} style={{...sb(c,true),padding:"3px 7px",fontSize:10}}>✕</button>
              </div>):(
                <button onClick={()=>setAddPg(true)} style={{background:"none",border:`1px dashed ${c}44`,borderRadius:7,padding:"3px 9px",fontSize:10,color:c,cursor:"pointer",fontFamily:FONT,opacity:.6}}>+ Page</button>
              )}
            </div>
            {/* Template picker */}
            {true&&(
              <div style={{marginBottom:8}}>
                <div style={{fontSize:9,color:C.gr,marginBottom:5}}>Load template:</div>
                <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:3}}>
                  {Object.keys(J_TPLS).map(t=><button key={t} onClick={()=>{if(!page?.content||page.content.trim()===''){updContent(J_TPLS[t]);}else if(window.confirm('Replace content with this template?')){updContent(J_TPLS[t]);}}} style={{background:C.card,border:`1px solid ${c}33`,borderRadius:7,padding:"4px 9px",fontSize:9,color:c,cursor:"pointer",fontFamily:FONT,whiteSpace:"nowrap"}}>{t}</button>)}
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:6,marginBottom:7,alignItems:"center"}}>
              <span style={{fontSize:9,color:C.gr}}>Size:</span>
              {[11,13,15,18,22].map(f=><button key={f} onClick={()=>setFontSize(f)} style={{background:fontSize===f?`${c}20`:"transparent",border:`1px solid ${fontSize===f?c:C.bdr}`,borderRadius:5,padding:"1px 5px",fontSize:9,color:fontSize===f?c:C.gr,cursor:"pointer",fontFamily:FONT}}>{f}</button>)}
            </div>
            <RichEditor content={page?.content||""} onChange={updContent} color={c} fontSize={fontSize} placeholder={`${subj.name} notes...`}/>
          </div>
        )}
        {tab==="add"&&!isVocab&&!isWorkout&&(
          <div>
            <div style={{fontSize:9,color:c,marginBottom:4}}>Question</div>
            <textarea value={nQ} onChange={e=>setNQ(e.target.value)} spellCheck={true} placeholder="Question or concept..." style={{...ta(c),marginBottom:8}} rows={3}/>
            <div style={{fontSize:9,color:c,marginBottom:4}}>Answer</div>
            <textarea value={nA} onChange={e=>setNA(e.target.value)} spellCheck={true} placeholder="Answer..." style={{...ta(c),marginBottom:12}} rows={3}/>
            <button onClick={addCard} style={{...sb(c),width:"100%",padding:"11px"}}>Add Flashcard</button>
            <div style={{marginTop:14}}>{DATA.slice(0,5).map(d=>(
              <div key={d.id} style={{...cd(c,{marginBottom:7,padding:"9px 11px"})}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{fontSize:12,fontWeight:700,color:c}}>{d.q}</div>
                  <button onClick={()=>delCard(d.id)} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:11,opacity:.6}}>🗑</button>
                </div>
                <div style={{fontSize:11,color:C.text,marginTop:3}}>{d.a}</div>
              </div>
            ))}</div>
          </div>
        )}
        {tab==="add"&&isVocab&&(
          <div>
            {[["word","Word *","e.g. Ephemeral"],["root","Root","e.g. epi + hemera"],["prefix","Prefix","e.g. un-"],["suffix","Suffix","e.g. -tion"],["meaning","Meaning *","Your words"]].map(([k,lbl,ph])=>(
              <div key={k} style={{marginBottom:8}}><div style={{fontSize:9,color:c,marginBottom:3}}>{lbl}</div><input value={vF[k]} onChange={e=>setVF(f=>({...f,[k]:e.target.value}))} placeholder={ph} style={ip(c)} spellCheck={true}/></div>
            ))}
            <div style={{fontSize:9,color:c,marginBottom:4}}>3 Sentences</div>
            {["s1","s2","s3"].map((k,i)=><input key={k} value={vF[k]} onChange={e=>setVF(f=>({...f,[k]:e.target.value}))} placeholder={`Sentence ${i+1}...`} style={{...ip(c),marginBottom:5}} spellCheck={true}/>)}
            <button onClick={addVF} style={{...sb(c),width:"100%",padding:"11px",marginTop:5}}>Save Word</button>
            <div style={{marginTop:12}}>{vocab.slice(0,4).map(v=>(
              <div key={v.id} style={{...cd(c,{marginBottom:7,padding:"9px 11px"})}}>
                <div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:13,fontWeight:700,color:c}}>{v.word}</div><button onClick={()=>delCard(v.id)} style={{background:"none",border:"none",color:C.r,cursor:"pointer",fontSize:11}}>🗑</button></div>
                <div style={{fontSize:11,color:C.text,marginTop:2}}>{v.meaning}</div>
                {v.root&&<div style={{fontSize:9,color:C.gr,marginTop:2}}>Root: {v.root}</div>}
              </div>
            ))}</div>
          </div>
        )}
        {tab==="log"&&isWorkout&&(
          <div>
            <div style={{fontSize:9,color:c,marginBottom:3}}>Exercise</div>
            <input value={wEx} onChange={e=>setWEx(e.target.value)} placeholder="e.g. Bench Press" style={{...ip(c),marginBottom:7}}/>
            <div style={{fontSize:9,color:c,marginBottom:3}}>Sets / Reps / Weight</div>
            <input value={wSets} onChange={e=>setWSets(e.target.value)} placeholder="e.g. 4x6 @ 185 lbs" style={{...ip(c),marginBottom:7}}/>
            <div style={{fontSize:9,color:c,marginBottom:3}}>Notes</div>
            <textarea value={wNote} onChange={e=>setWNote(e.target.value)} spellCheck={true} placeholder="Form, energy..." style={{...ta(c),marginBottom:11}} rows={2}/>
            <button onClick={addW} style={{...sb(c),width:"100%",padding:"11px"}}>Log Exercise</button>
          </div>
        )}
        {tab==="history"&&isWorkout&&(wLogs.length===0?<div style={{textAlign:"center",padding:"50px 0",color:C.gr,fontSize:12}}>No logs yet.</div>:wLogs.map(l=>(
          <div key={l.id} style={{...cd(c,{padding:"9px 11px",marginBottom:7})}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:12,fontWeight:700,color:c}}>{l.ex}</div><span style={{fontSize:9,color:C.gr}}>{l.date}</span></div><div style={{fontSize:11,color:C.text,marginTop:2}}>{l.sets}</div>{l.note&&<div style={{fontSize:10,color:C.gr,marginTop:2}}>{l.note}</div>}</div>
        )))}
        {tab==="flash"&&(DATA.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.gr,fontSize:12}}>No entries yet.</div>:(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{display:"flex",gap:7}}><span style={{...bg(C.g),padding:"3px 9px"}}>✓ {arScore.k}</span><span style={{...bg(C.r),padding:"3px 9px"}}>✗ {arScore.d}</span></div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <button onClick={()=>{setFlip(false);setCi(i=>Math.max(0,i-1));}} style={{...sb(c,true),padding:"4px 9px",fontSize:10}}>←</button>
                <span style={{fontSize:10,color:C.gr}}>{(ci%DATA.length)+1}/{DATA.length}</span>
                <button onClick={()=>{setFlip(false);setCi(i=>i+1);}} style={{...sb(c),padding:"4px 9px",fontSize:10}}>→</button>
              </div>
            </div>
            {(()=>{const d=DATA[ci%DATA.length];const isV=d.word!==undefined;return(
              <div onClick={()=>setFlip(f=>!f)} style={{background:C.card,border:`2px solid ${flip?C.g:C.bdr}`,borderRadius:18,padding:26,minHeight:190,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",textAlign:"center",marginBottom:11}}>
                {!flip?(<><div style={{fontSize:20,fontWeight:700,color:c,marginBottom:7}}>{isV?d.word:d.q}</div>{isV&&d.root&&<div style={{fontSize:10,color:C.gr}}>Root: {d.root}</div>}<div style={{fontSize:9,color:C.gr,marginTop:5}}>Tap to reveal</div></>)
                :(<><div style={{fontSize:17,fontWeight:700,color:C.g,marginBottom:7}}>{isV?d.meaning:d.a}</div>{isV&&d.s1&&<div style={{fontSize:11,color:C.text,fontStyle:"italic"}}>"{d.s1}"</div>}</>)}
              </div>
            );})()}
            {flip&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
              <button onClick={()=>{setArScore(s=>({...s,k:s.k+1}));setCi(i=>i+1);setFlip(false);}} style={{...sb(C.g),padding:"11px",fontSize:13}}>✓ Knew it</button>
              <button onClick={()=>{setArScore(s=>({...s,d:s.d+1}));setCi(i=>i+1);setFlip(false);}} style={{...sb(C.r),padding:"11px",fontSize:13}}>✗ Didn't</button>
            </div>}
            <button onClick={startQ} style={{...sb(C.p,true),width:"100%",padding:"9px"}}>🧠 Quiz Mode</button>
          </div>
        ))}
        {tab==="quiz"&&(DATA.length<2?<div style={{textAlign:"center",padding:"50px 0",color:C.gr,fontSize:12}}>Need 2+ entries.</div>:(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
              <div style={{display:"flex",gap:7}}><span style={{...bg(C.g),padding:"3px 8px"}}>✓ {qScore.r}</span><span style={{...bg(C.r),padding:"3px 8px"}}>✗ {qScore.w}</span></div>
              <button onClick={()=>startQ()} style={{...sb(c,true),padding:"3px 9px",fontSize:10}}>Restart</button>
            </div>
            {qQ&&(<>
              <div style={{background:C.card,borderRadius:14,padding:18,marginBottom:11,textAlign:"center"}}>
                <div style={{fontSize:9,color:C.gr,marginBottom:5,letterSpacing:1}}>{isVocab?"WHAT DOES THIS MEAN?":"ANSWER:"}</div>
                <div style={{fontSize:20,fontWeight:700,color:c}}>{isVocab?qQ.co.word:qQ.co.q}</div>
              </div>
              {qQ.opts.map(opt=>{
                const ans=isVocab?opt.meaning:opt.a;let bg2=C.card,brd=C.bdr,co=C.text;
                if(qA){if(opt.id===qQ.co.id){bg2=`${C.g}15`;brd=C.g;co=C.g;}else if(opt.id===qA){bg2=`${C.r}15`;brd=C.r;co=C.r;}}
                return<div key={opt.id} onClick={()=>{if(!qA)ansQ(opt);}} style={{background:bg2,border:`1.5px solid ${brd}`,borderRadius:10,padding:"10px 13px",marginBottom:6,cursor:qA?"default":"pointer",color:co,fontSize:12}}>{ans}</div>;
              })}
              {qA&&<button onClick={()=>nextQ(DATA)} style={{...sb(c),width:"100%",marginTop:6,padding:"10px"}}>Next →</button>}
            </>)}
          </div>
        ))}
        {tab==="spell"&&isVocab&&(vocab.length===0?<div style={{textAlign:"center",padding:"60px 0",color:C.gr,fontSize:12}}>No words yet.</div>:(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:11}}>
              <button onClick={()=>{setSi(i=>Math.max(0,i-1));setSpell("");setSpR(null);}} style={{...sb(c,true),padding:"3px 9px",fontSize:10}}>← Prev</button>
              <span style={{fontSize:10,color:C.gr}}>{si+1}/{vocab.length}</span>
              <button onClick={()=>{setSi(i=>Math.min(vocab.length-1,i+1));setSpell("");setSpR(null);}} style={{...sb(c),padding:"3px 9px",fontSize:10}}>Next →</button>
            </div>
            <div style={{background:C.card,borderRadius:14,padding:20,marginBottom:11,textAlign:"center"}}>
              <div style={{fontSize:8,color:C.gr,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Spell this word:</div>
              <div style={{fontSize:14,color:C.text,fontStyle:"italic",marginBottom:4}}>"{vocab[si].meaning}"</div>
              {vocab[si].root&&<div style={{fontSize:9,color:C.gr}}>Root hint: {vocab[si].root}</div>}
            </div>
            <input value={spell} onChange={e=>{setSpell(e.target.value);setSpR(null);}} placeholder="Type the word..." onKeyDown={e=>e.key==="Enter"&&chkSp()} spellCheck={false} style={{...ip(c),marginBottom:8,fontSize:14,textAlign:"center",letterSpacing:2}}/>
            <button onClick={chkSp} style={{...sb(c),width:"100%",padding:"9px",marginBottom:8}}>Check</button>
            {spR&&<div style={{textAlign:"center",fontSize:13,fontWeight:700,color:spR.startsWith("✓")?C.g:C.r,padding:"10px",background:spR.startsWith("✓")?`${C.g}15`:`${C.r}15`,borderRadius:10}}>{spR}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// TO-DO
// ══════════════════════════════════════════
function Todo({todos,setTodos}){
  const[tab,setTab]=React.useState("all");
  const[newText,setNewText]=React.useState("");
  const[selDay,setSelDay]=React.useState(WM[new Date().getDay()===0?6:new Date().getDay()-1].name);
  const[noteText,setNoteText]=React.useState(todos._note||"");
  const DAYS=WM.map(w=>w.name);
  const allTodos=todos._all||[];
  const dayTodos=(todos._day?.[selDay])||[];
  const showList=tab==="all"?allTodos:dayTodos;

  function add(){
    if(!newText.trim())return;
    if(tab==="all")setTodos({...todos,_all:[...allTodos,{id:Date.now(),text:newText.trim(),done:false}]});
    else setTodos({...todos,_day:{...(todos._day||{}),[selDay]:[...dayTodos,{id:Date.now(),text:newText.trim(),done:false}]}});
    setNewText("");
  }
  function toggle(id,isDay=false){
    if(isDay)setTodos({...todos,_day:{...(todos._day||{}),[selDay]:dayTodos.map(t=>t.id===id?{...t,done:!t.done}:t)}});
    else setTodos({...todos,_all:allTodos.map(t=>t.id===id?{...t,done:!t.done}:t)});
  }
  function del(id,isDay=false){
    if(isDay)setTodos({...todos,_day:{...(todos._day||{}),[selDay]:dayTodos.filter(t=>t.id!==id)}});
    else setTodos({...todos,_all:allTodos.filter(t=>t.id!==id)});
  }
  function copyToDay(t){setTodos({...todos,_day:{...(todos._day||{}),[selDay]:[...dayTodos,{...t,id:Date.now()}]}});}
  function saveNote(v){setNoteText(v);setTodos({...todos,_note:v});}

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 14px"}}>
        <div style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:C.gr,marginBottom:3}}>Task Management</div>
        <div style={{fontSize:18,fontWeight:800,color:C.w,marginBottom:10}}>To-Do List</div>
        <div style={{display:"flex",gap:4}}>
          {[["all","📋 All"],["day","📅 By Day"],["note","📝 Notes"]].map(([v,l])=><button key={v} onClick={()=>setTab(v)} style={{...sb(C.g,tab!==v),padding:"4px 10px",fontSize:10}}>{l}</button>)}
        </div>
      </div>
      <div style={{padding:"12px 14px 0"}}>
        {tab!=="note"&&(<>
          {tab==="day"&&<div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:9}}>{DAYS.map(d=><button key={d} onClick={()=>setSelDay(d)} style={{background:"none",border:"none",borderBottom:`2px solid ${selDay===d?C.g:"transparent"}`,padding:"4px 8px",fontSize:10,cursor:"pointer",color:selDay===d?C.g:C.gr,fontFamily:FONT,whiteSpace:"nowrap"}}>{d.slice(0,3)}</button>)}</div>}
          <div style={{display:"flex",gap:7,marginBottom:9}}>
            <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder={tab==="all"?"Add to master list...":"Add for "+selDay+"..."} style={{...ip(C.g),flex:1}} spellCheck={true}/>
            <button onClick={add} style={{...sb(C.g),padding:"8px 13px",fontSize:14}}>+</button>
          </div>
          {showList.length===0?<div style={{color:C.gr,fontSize:12,fontStyle:"italic",textAlign:"center",padding:"30px 0"}}>No tasks here.</div>:showList.map(t=>(

function Hard75({hard75,setHard75,hard75Streak,setHard75Streak}){
  const tasks=hard75.tasks||H75_DEFAULT;

  const[editTasks,setEditTasks]=React.useState(false);
  const[tasksText,setTasksText]=React.useState(tasks.join("\n"));
  const done=tasks.filter((_,i)=>todayData[i]).length;
  const pct=tasks.length>0?Math.round(done/tasks.length*100):0;
  function toggle(i){const next={...hard75,daily:{...(hard75.daily||{}),[todayKey]:{...todayData,[i]:!todayData[i]}}};setHard75(next);}
  function saveTasks(){const t=tasksText.split("\n").map(l=>l.trim()).filter(Boolean);setHard75({...hard75,tasks:t});setEditTasks(false);}

        <div style={{textAlign:"center",background:`${C.r}12`,border:`1px solid ${C.r}33`,borderRadius:16,padding:"22px",marginBottom:14}}>
          <div style={{fontSize:52,fontWeight:900,color:C.r}}>{hard75Streak||0}</div>
          <div style={{fontSize:11,color:C.text}}>Day{hard75Streak!==1?"s":""} complete</div>
          <div style={{fontSize:9,color:C.gr,marginTop:3}}>75 days of absolute discipline</div>

        </div>
        {editTasks&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,color:C.gr,marginBottom:5}}>One task per line:</div>
            <textarea value={tasksText} onChange={e=>setTasksText(e.target.value)} style={{...ta(C.r),minHeight:160,marginBottom:7}} spellCheck={true}/>
            <button onClick={saveTasks} style={{...sb(C.r),width:"100%",padding:"9px"}}>Save Tasks</button>
          </div>
        )}
        {tasks.map((task,i)=>(
          <div key={i} onClick={()=>toggle(i)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.card,border:`1px solid ${todayData[i]?C.r+"44":C.bdr}`,borderRadius:10,marginBottom:7,cursor:"pointer",opacity:todayData[i]?.7:1}}>
            <div style={{width:20,height:20,borderRadius:5,flexShrink:0,border:`2px solid ${todayData[i]?C.r:C.dim}`,background:todayData[i]?C.r:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{todayData[i]&&<span style={{color:C.bg,fontSize:12,fontWeight:900}}>✓</span>}</div>

    </div>
  );

  const[subjects,setSubjects]=useStore("subs_v5",DEFAULT_SUBS);
  const[events,setEvents]=useStore("events_v5",{});
  const[hard75,setHard75]=useStore("h75_v5",{});
  const[hard75Streak,setHard75Streak]=useStore("h75s_v5",0);
  const[affirmation,setAffirmation]=useStore("aff_v5",DEFAULT_AFF);
  const[metrics,setMetrics]=useStore("mets_v5",[{id:"water",emoji:"💧",label:"Water",value:"16 cups/day",color:C.b},{id:"streak",emoji:"🔥",label:"Streak",value:"0 days",color:C.r},{id:"weight",emoji:"⚖️",label:"Weight",value:"140→165 lbs",color:C.g}]);

  React.useEffect(function(){
    const s=lsGet("sched_v5");
    if(s)try{setSchedData(JSON.parse(s));return;}catch(e){}
    if(SB_ON){dbGet("sched_v5").then(function(r){try{setSchedData(r?JSON.parse(r):buildSchedule());}catch(e){setSchedData(buildSchedule());}}).catch(function(){setSchedData(buildSchedule());});}
    else setSchedData(buildSchedule());
  },[]);

  function setSchedule(next){setSchedData(next);lsSet("sched_v5",next);dbSet("sched_v5",next);}
  function nav(dest){if(dest.startsWith("subject:")){setSubjectId(dest.replace("subject:",""));setScreen(SC.subject);}else setScreen(dest);}

  if(!auth)return <Lock onOk={()=>setAuth(true)}/>;
  if(!schedData)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.w,fontFamily:FONT,fontSize:13}}>Loading your Life OS...</div>;

  const hideNav=screen===SC.subject;
  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:hideNav?0:58}}>
      {screen===SC.home&&<Home nav={nav} checks={checks} schedule={schedData} todos={todos} setTodos={setTodos} hard75={hard75} setHard75={setHard75} hard75Streak={hard75Streak} setHard75Streak={setHard75Streak} affirmation={affirmation} setAffirmation={setAffirmation} metrics={metrics} setMetrics={setMetrics}/>}
      {screen===SC.week&&<Week onDayClick={(i)=>{setDayIdx(i);setScreen(SC.day);}} checks={checks} schedule={schedData} events={events} setEvents={setEvents}/>}
      {screen===SC.day&&dayIdx!==null&&<Day dayIdx={dayIdx} checks={checks} setChecks={setChecks} schedule={schedData} setSchedule={setSchedule} nav={nav} events={events} subjects={subjects}/>}
      {screen===SC.subjects&&<Subjects nav={nav} subjects={subjects} setSubjects={setSubjects}/>}
      {screen===SC.subject&&subjectId&&<SubjectPage subjectId={subjectId} nav={nav} subjects={subjects}/>}
      {screen===SC.todo&&<Todo todos={todos} setTodos={setTodos}/>}
      {screen===SC.goals&&<Goals goals={goals} setGoals={setGoals}/>}
      {screen===SC.hard75&&<Hard75 hard75={hard75} setHard75={setHard75} hard75Streak={hard75Streak} setHard75Streak={setHard75Streak}/>}
      {screen===SC.chat&&<Chat schedule={schedData} checks={checks} todos={todos} goals={goals} hard75Streak={hard75Streak}/>}
      {!hideNav&&<NavBar screen={screen} nav={nav}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
