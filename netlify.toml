[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/openclaw"
  to = "/.netlify/functions/openclaw"
  status = 200

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic"
  status = 200

[[redirects]]
  from = "/api/ai-status"
  to = "/.netlify/functions/ai-status"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
