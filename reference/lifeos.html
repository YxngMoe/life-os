let raf=null;
function rr(){if(raf)return;raf=requestAnimationFrame(()=>{raf=null;render();});}
function ss(p){Object.assign(ST,p);rr();}
function nav(sc,p={}){ST.psc=ST.sc;ST.sc=sc;if(p.sid)ST.sid=p.sid;if(p.did)ST.did=p.did;if(p.tab)ST.stab=p.tab;if(p.day)ST.cd=p.day;rr();}

// DOM helpers
function el(tag,props,ch){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(props||{})){
    if(v==null||v===false)continue;
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="class")e.className=v;
    else if(k.startsWith("on")&&typeof v==="function")e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,String(v));
  }
  ap(e,ch);return e;
}
function ap(e,...args){
  for(const c of args.flat(9)){
    if(c==null||c===false)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node)e.appendChild(c);
  }
}
function D(cls,st,ch){const e=document.createElement("div");if(cls)e.className=cls;if(st&&typeof st==="object")Object.assign(e.style,st);ap(e,ch);return e;}
function Sp(t,s={}){const e=document.createElement("span");Object.assign(e.style,s);e.textContent=t;return e;}
function Btn(t,cls,fn,s={}){const b=document.createElement("button");b.className="btn "+cls;b.textContent=t;Object.assign(b.style,s);if(fn)b.addEventListener("click",fn);return b;}
function Inp(ph,val,cb,s={}){const i=document.createElement("input");i.className="inp";i.placeholder=ph||"";i.value=val||"";Object.assign(i.style,s);if(cb)i.addEventListener("input",cb);return i;}
function Txa(ph,val,cb,rows=4){const t=document.createElement("textarea");t.className="inp ta";t.placeholder=ph||"";t.value=val||"";t.rows=rows;if(cb)t.addEventListener("input",cb);return t;}
function Row(...items){const r=D("",{display:"flex",gap:"8px",alignItems:"center"});ap(r,...items);return r;}
function Col(g,...items){const c=D("",{display:"flex",flexDirection:"column",gap:g+"px"});ap(c,...items);return c;}
function Sp2(h=8){return D("",{height:h+"px"});}

function getDQ(){const q=ST.enc.quotes;if(!q||!q.length)return{t:"Discipline is the bridge between goals and accomplishment.",a:"Jim Rohn"};return q[new Date().getDate()%q.length];}

function ring(pct,col,size=52){
  const r=20,circ=2*Math.PI*r,dash=circ*(pct/100);
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("viewBox","0 0 48 48");
  function circle(stroke,sw,d2,off){const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx","24");c.setAttribute("cy","24");c.setAttribute("r","20");
    c.setAttribute("fill","none");c.setAttribute("stroke",stroke);c.setAttribute("stroke-width",sw);
    if(d2){c.setAttribute("stroke-dasharray",d2);c.setAttribute("stroke-dashoffset",off);
      c.setAttribute("stroke-linecap","round");c.style.transform="rotate(-90deg)";c.style.transformOrigin="50% 50%";}
    return c;}
  const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
  txt.setAttribute("x","24");txt.setAttribute("y","29");txt.setAttribute("text-anchor","middle");
  txt.setAttribute("fill",col);txt.setAttribute("font-size","10");txt.setAttribute("font-weight","700");
  txt.textContent=Math.round(pct)+"%";
  ap(svg,circle("rgba(255,255,255,0.1)","4"),circle(col,"4",circ.toFixed(1),(circ-dash).toFixed(1)),txt);
  return svg;
}

function updateStreak(){
  const today=tk();const allDone=ST.checks.every(x=>x.done);const st=ST.streak;
  if(allDone&&st.last!==today){const yest=new Date();yest.setDate(yest.getDate()-1);
    const yk=dK(yest);st.cur=st.last===yk?st.cur+1:1;st.last=today;if(st.cur>st.best)st.best=st.cur;S.s("streak",st);}
}

function render(){
  const root=document.getElementById("root");root.innerHTML="";
  const app=D("",{id:"app"});
  if(ST.lm)app.classList.add("lm");
  ap(app,D("",{id:"bg"}));
  if(ST.sc==="pin"){ap(app,rPin());}
  else{
    let sc;
    switch(ST.sc){
      case"home":sc=rHome();break;case"cal":sc=rCal();break;
      case"knowledge":sc=rKnowledge();break;case"subject":sc=rSubject();break;
      case"todo":sc=rTodo();break;case"life":sc=rLife();break;
      case"dashboards":sc=rDashes();break;case"dash":sc=rDash();break;
      case"chat":sc=rChat();break;case"encyclopedia":sc=rEnc();break;
      default:sc=rHome();
    }
    ap(app,sc);
    if(ST.sc!=="chat")ap(app,rNav());
    else ap(app,rNav());
  }
  ap(root,app);
}

function rPin(){
  const w=D("",{id:"pin-s"});
  ap(w,el("div",{style:{fontSize:"48px",marginBottom:"8px"}},"🧠"),
    el("div",{style:{fontSize:"26px",fontWeight:"900",color:"var(--t)",marginBottom:"4px"}},"Life OS"),
    el("div",{style:{fontSize:"13px",color:"var(--t2)",marginBottom:"32px"}},"Mohamed · Second Brain"));
  const dots=D("",{display:"flex",gap:"12px",marginBottom:"8px"});
  for(let i=0;i<4;i++){const d=D("pdot");if(i<ST.pt.length)d.classList.add("on");ap(dots,d);}
  const err=el("div",{style:{color:"var(--red)",fontSize:"12px",height:"18px",textAlign:"center",marginBottom:"12px",opacity:ST.pe?1:0}},"Incorrect PIN ✗");
  ap(w,dots,err);
  const grid=D("",{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",width:"230px"});
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k=>{
    if(k===""){ap(grid,D(""));return;}
    const b=el("button",{class:"pkey",onclick:()=>{
      if(k==="⌫"){ST.pt=ST.pt.slice(0,-1);ST.pe=false;}
      else if(ST.pt.length<4){ST.pt+=String(k);if(ST.pt.length===4){if(ST.pt===PIN){ST.pt="";ST.pe=false;nav("home");}else{ST.pe=true;ST.pt="";}}}
      rr();
    }},String(k));
    ap(grid,b);
  });
  ap(w,grid);return w;
}

function rNav(){
  const ITEMS=[{id:"home",i:"🏠",l:"Home"},{id:"cal",i:"📅",l:"Cal"},
    {id:"knowledge",i:"🧠",l:"Brain"},{id:"encyclopedia",i:"📖",l:"Enc"},
    {id:"life",i:"🎯",l:"Life"},{id:"dashboards",i:"📊",l:"Dash"},{id:"chat",i:"✨",l:"AI"}];
  const isA=id=>ST.sc===id||(ST.sc==="subject"&&id==="knowledge")||(ST.sc==="dash"&&id==="dashboards");
  const bar=D("",{id:"nav"});
  ITEMS.forEach(({id,i,l})=>{
    const a=isA(id);const b=D("nb"+(a?" on":""));
    b.addEventListener("click",()=>nav(id));
    ap(b,el("span",{class:"ni"},i),el("span",{class:"nl"},l));
    if(a)ap(b,D("ndot"));ap(bar,b);
  });
  const eb=D("nb eb"+(ST.em?" on":""));
  eb.addEventListener("click",()=>{
    if(ST.em){ST.em=false;S.s("em",false);rr();return;}
    const p=prompt("Enter PIN to enable editing:");
    if(p===PIN){ST.em=true;S.s("em",true);rr();}else if(p!==null)alert("Incorrect PIN");
  });
  ap(eb,el("span",{class:"ni"},ST.em?"🔓":"🔐"),el("span",{class:"nl",style:{color:ST.em?"var(--gold)":""}},ST.em?"Editing":"Edit"));
  if(ST.em)ap(eb,D("ndot",{background:"var(--gold)"}));
  ap(bar,eb);return bar;
}

// ═══ HOME ═══

async function sendChat(){
  const txt=ST.ci.trim();if(!txt||ST.cl)return;
  ST.msgs=[...ST.msgs,{r:"u",t:txt}];ST.ci="";ST.cl=true;rr();
  const SYS=`You are Mohamed's AI second brain. You know: 23yo Sudanese-American Muslim, JPMC data engineer Philadelphia, lives in car at The Sporting Club, goals: 140→165lbs, ABW franchise, marry Alaa (Aug 2027), Medical: EOE/UC/PSC, studies: Andrew Ng AI, JPMC Databricks/Spark, Wharton+ABW, Islamic studies, Arabic with Ahmed. Memory: ${ST.mem}. Be direct, coaching-style, push back when needed.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYS,messages:[...ST.msgs.slice(-12).filter(m=>m.r==="u").map(m=>({role:"user",content:m.t})),{role:"user",content:txt}]})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||"Connection issue — try again.";
    ST.msgs=[...ST.msgs,{r:"a",t:reply}];
    if(txt.toLowerCase().includes("remember")||txt.toLowerCase().includes("note that"))ST.mem=ST.mem+"\n"+txt;
    S.s("chat",ST.msgs.slice(-40));
  }catch{ST.msgs=[...ST.msgs,{r:"a",t:"Connection issue — check internet and try again."}];}
  ST.cl=false;rr();
}
